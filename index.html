<style>
  html, body { background:#f5f5f7; -webkit-tap-highlight-color: transparent; margin:0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif; color:#1c1c1e; }
  * { -webkit-touch-callout: none; }
  input, button, select, textarea { font-family: inherit; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  @keyframes slideUp { 0%{transform:translateY(100%)} 100%{transform:translateY(0)} }
  .sheet-in { animation: slideUp .28s cubic-bezier(.32,.72,0,1); }
  @keyframes fadeIn { 0%{opacity:0} 100%{opacity:1} }
  .fade-in { animation: fadeIn .2s ease-out; }
  @keyframes pop { 0%{transform:scale(.85);opacity:0} 100%{transform:scale(1);opacity:1} }
  .pop { animation: pop .25s cubic-bezier(.4,2,.6,1); }
  #boot { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#f5f5f7; z-index:9999; transition:opacity .3s; }
  #boot.hide { opacity:0; pointer-events:none; }
  #boot .spinner { width:36px; height:36px; border:3px solid #e5e7eb; border-top-color:#22c55e; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #boot .text { margin-top:16px; color:#6b7280; font-size:14px; }
  #boot .err { max-width:340px; margin-top:16px; padding:16px; background:#fef2f2; border:1px solid #fecaca; border-radius:12px; color:#991b1b; font-size:13px; line-height:1.6; white-space:pre-wrap; word-break:break-all; }
  #boot .recover { margin-top:14px; display:flex; gap:8px; }
  #boot .recover button { padding:8px 14px; border-radius:8px; border:0; background:#22c55e; color:#fff; font-size:13px; cursor:pointer; }
  #boot .recover button.ghost { background:#fff; color:#374151; border:1px solid #d1d5db; }
</style>
</head>
<body>
<div id="root"></div>

<div id="boot">
  <div class="spinner"></div>
  <div class="text">載入中⋯</div>
  <div class="err" id="bootErr" style="display:none;"></div>
  <div class="recover" id="bootRecover" style="display:none;">
    <button onclick="location.reload()">重新整理</button>
    <button class="ghost" onclick="if(confirm('清快取重來？資料保留。')){sessionStorage.clear(); location.reload();}">清快取重來</button>
  </div>
</div>

<script>
  function showBootError(msg, details){
    const boot = document.getElementById('boot');
    const err = document.getElementById('bootErr');
    const rec = document.getElementById('bootRecover');
    if(!boot || !err) return;
    boot.querySelector('.spinner').style.display = 'none';
    boot.querySelector('.text').textContent = msg || '載入失敗';
    err.style.display = 'block';
    err.textContent = (details || '').toString().slice(0, 800);
    rec.style.display = 'flex';
    boot.classList.remove('hide');
  }
  window.addEventListener('error', function(e){
    showBootError('發生錯誤，App 無法啟動', (e.message || '') + '\n' + (e.filename || '') + ':' + (e.lineno || ''));
  });
  window.addEventListener('unhandledrejection', function(e){
    showBootError('非同步錯誤', e.reason && (e.reason.stack || e.reason.message || e.reason) || 'unknown');
  });
  setTimeout(function(){
    const root = document.getElementById('root');
    if(root && root.children.length === 0){
      const missing = [];
      if(typeof React === 'undefined') missing.push('React');
      if(typeof ReactDOM === 'undefined') missing.push('ReactDOM');
      if(typeof Babel === 'undefined') missing.push('Babel');
      showBootError('載入超時', '可能網路不穩或 CDN 抓不到。\n' + (missing.length ? '未載入：' + missing.join(', ') : '所有 CDN 已載入,但 App 沒啟動'));
    } else {
      const boot = document.getElementById('boot');
      if(boot) boot.classList.add('hide');
      setTimeout(()=> boot && boot.remove(), 400);
    }
  }, 8000);
  window.__appReady = function(){
    const boot = document.getElementById('boot');
    if(boot){ boot.classList.add('hide'); setTimeout(()=> boot.remove(), 400); }
  };
</script>

/* ============================================================
 *  計算 / Storage
 * ============================================================ */
function calcAge(birthDate){
  if(!birthDate) return 30;
  const b = new Date(birthDate);
  const t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  const m = t.getMonth() - b.getMonth();
  if(m < 0 || (m === 0 && t.getDate() < b.getDate())) age--;
  return age;
}

function calcDailyTargets(profile){
  const { gender, birthday, height_cm, current_weight_kg, target_weight_kg, activity_level, weight_loss_pace } = profile;
  const age = calcAge(birthday);
  const w = parseFloat(current_weight_kg);
  const h = parseFloat(height_cm);
  let bmr = (10 * w) + (6.25 * h) - (5 * age);
  bmr += (gender === 'male' ? 5 : -161);
  const activityFactors = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725 };
  const tdee = bmr * (activityFactors[activity_level] || 1.375);
  const deficits = { mild:250, standard:500, aggressive:750 };
  let dailyKcal = Math.round(tdee - (deficits[weight_loss_pace] || 500));
  const floor = gender === 'male' ? 1500 : 1200;
  let floorApplied = false;
  if(dailyKcal < floor){ dailyKcal = floor; floorApplied = true; }
  const proteinG = Math.round((dailyKcal * 0.30) / 4);
  const carbsG   = Math.round((dailyKcal * 0.40) / 4);
  const fatG     = Math.round((dailyKcal * 0.30) / 9);
  const waterMl = Math.round(w * 32);
  const diff = w - parseFloat(target_weight_kg);
  const weeklyLossKg = (deficits[weight_loss_pace] || 500) * 7 / 7700;
  const weeksToGoal = diff > 0 ? Math.ceil(diff / weeklyLossKg) : 0;
  return {
    age, bmr: Math.round(bmr), tdee: Math.round(tdee),
    dailyKcal, proteinG, carbsG, fatG, waterMl, weeksToGoal,
    floorApplied,
    bmi: +(w / ((h/100)*(h/100))).toFixed(1),
  };
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function firstChar(name){ return (name || '').trim().charAt(0).toUpperCase() || '?'; }

// 日期工具
function ymd(d){ return d.toISOString().slice(0,10); }
function parseYMD(s){ const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function isFuture(dateStr){ return dateStr > todayStr(); }

// 取得指定日期所在週的 7 天（週一到週日）
function getWeekDates(centerDateStr){
  const center = parseYMD(centerDateStr);
  const dayOfWeek = (center.getDay() + 6) % 7; // 週一 = 0
  const monday = new Date(center); monday.setDate(center.getDate() - dayOfWeek);
  return Array.from({length:7}, (_,i) => {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    return ymd(d);
  });
}

// 取得指定年月的日曆網格（從週一開始，前後補齊）
function getMonthGrid(year, month){
  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  const firstWeekday = (firstDay.getDay() + 6) % 7;
  const start = new Date(firstDay); start.setDate(1 - firstWeekday);
  const cells = [];
  for(let i=0; i<42; i++){
    const d = new Date(start); d.setDate(start.getDate() + i);
    cells.push({ date: ymd(d), inMonth: d.getMonth() === month, day: d.getDate() });
    if(i >= 27 && d >= lastDay && (i+1) % 7 === 0) break; // 結束於完整週
  }
  return cells;
}

// 計算某天的攝取狀態
function getDayStatus(dateStr, allEntries, target){
  const today = todayStr();
  if(dateStr > today) return { status: 'future', kcal: 0 };
  const sum = allEntries.filter(e => e.date === dateStr).reduce((a,e) => a + e.kcal * e.amount, 0);
  if(dateStr === today) return { status: 'today', kcal: sum };
  if(sum === 0) return { status: 'none', kcal: 0 };
  if(sum > target) return { status: 'over', kcal: sum };
  return { status: 'under', kcal: sum };
}

};

function formatKcal(n){
  if(n === 0) return '—';
  if(n < 1000) return Math.round(n).toString();
  return (n/1000).toFixed(1) + 'k';
}

function KcalRing({ consumed, target, size=200 }){
  const remaining = target - consumed;
  const overBudget = consumed > target;
  const pct = Math.min(consumed / target, 1);
  const r = 78;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - pct);
  return (
    <div className="relative flex items-center justify-center" style={{width:size, height:size}}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} stroke="#f1f1f4" strokeWidth="14" fill="none"/>
        <circle cx={size/2} cy={size/2} r={r}
          stroke={overBudget ? '#ef4444' : '#22c55e'}
          strokeWidth="14" fill="none"
          strokeDasharray={c}
          strokeDashoffset={offset}
          strokeLinecap="round"
          style={{transition:'stroke-dashoffset .6s cubic-bezier(.4,1,.4,1)'}}

      <div className="absolute inset-0 flex flex-col items-center justify-center">

        </div>
        <div className="text-xs text-gray-400 mt-1">kcal {overBudget?'超出':'剩餘'}</div>
      </div>
    </div>
  );
}

    const d = parseYMD(centerDate); d.setDate(d.getDate() + delta*7);
    onPick(ymd(d));
  };

  return (
    <div className="bg-white rounded-3xl p-3 pb-2">

          </div>

                <div className={'text-xs mt-0.5 ' + (data.activity_level===a.v?'text-green-50':'text-gray-500')}>{a.d}</div>
              </button>
            ))}

        </div>
        <div>
          <label className="text-sm text-gray-500 block mb-2.5">減重步調</label>
          <div className="grid grid-cols-3 gap-2">
            {[
              {v:'mild',l:'溫和',d:'-0.25 kg/週'},
              {v:'standard',l:'標準',d:'-0.5 kg/週'},
              {v:'aggressive',l:'積極',d:'-0.75 kg/週'},
            ].map(p => (
              <button key={p.v} onClick={()=>update('weight_loss_pace',p.v)}
                className={'p-3 rounded-2xl transition active:scale-95 ' + (data.weight_loss_pace===p.v?'bg-green-500 text-white':'bg-gray-100 text-gray-700')}>
                <div className="text-sm font-medium">{p.l}</div>
                <div className={'text-[10px] mt-0.5 ' + (data.weight_loss_pace===p.v?'text-green-50':'text-gray-500')}>{p.d}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    )},
    { title:'你的每日目標', body: targets && (
      <div className="space-y-4 fade-in">
        {targets.floorApplied && (
          <div className="bg-amber-50 border border-amber-200 rounded-2xl p-4 text-sm text-amber-800">
            ⚠️ 步調會讓熱量低於健康下限，已自動調整為 {data.gender==='male'?1500:1200} 大卡
          </div>
        )}
        <div className="bg-white rounded-3xl p-6 border border-gray-100">
          <div className="text-xs text-gray-400 mb-1">每日熱量目標</div>
          <div className="flex items-baseline gap-2">
            <span className="text-4xl font-bold text-green-500">{targets.dailyKcal.toLocaleString()}</span>
            <span className="text-gray-400">kcal</span>
          </div>
          <div className="text-xs text-gray-400 mt-2">基礎代謝 {targets.bmr} · 總消耗 {targets.tdee}</div>
        </div>
        <div className="bg-white rounded-3xl p-6 border border-gray-100">
          <div className="text-xs text-gray-400 mb-3">三大營養素</div>
          <div className="grid grid-cols-3 gap-3 text-center">
            <div><div className="text-2xl font-bold text-red-400">{targets.proteinG}<span className="text-xs text-gray-400 ml-0.5">g</span></div><div className="text-[11px] text-gray-500 mt-0.5">蛋白質</div></div>
            <div><div className="text-2xl font-bold text-amber-500">{targets.carbsG}<span className="text-xs text-gray-400 ml-0.5">g</span></div><div className="text-[11px] text-gray-500 mt-0.5">碳水</div></div>
            <div><div className="text-2xl font-bold text-blue-400">{targets.fatG}<span className="text-xs text-gray-400 ml-0.5">g</span></div><div className="text-[11px] text-gray-500 mt-0.5">脂肪</div></div>
          </div>
        </div>
        <div className="bg-white rounded-3xl p-6 border border-gray-100 grid grid-cols-2 gap-3 text-center">

            <div className="text-xs text-gray-400">每日水分</div>
            <div className="text-2xl font-bold text-cyan-500 mt-1">{targets.waterMl}<span className="text-xs text-gray-400 ml-0.5">ml</span></div>
          </div>
          <div>
            <div className="text-xs text-gray-400">預估達標</div>
            <div className="text-2xl font-bold text-gray-700 mt-1">{targets.weeksToGoal}<span className="text-xs text-gray-400 ml-0.5">週</span></div>
          </div>
        </div>
      </div>
    )},
  ];

  const cur = steps[step];
  return (
    <div className="min-h-screen bg-white max-w-md mx-auto p-6 pb-28 relative"
         style={{maxWidth:'448px', margin:'0 auto', position:'relative', minHeight:'100vh', background:'#ffffff', padding:'24px', paddingBottom:'112px'}}>
      <div className="flex gap-1 mb-8">
        {steps.map((_,i) => (
          <div key={i} className={'flex-1 h-1 rounded-full transition-colors ' + (i<=step?'bg-green-500':'bg-gray-200')}/>
        ))}
      </div>
      <h2 className="text-2xl font-bold text-gray-900 mb-6">{cur.title}</h2>
      {cur.body}
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-100 p-4 max-w-md mx-auto"
           style={{position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:'448px', background:'#ffffff', borderTop:'1px solid #f3f4f6', padding:'16px'}}>
        <div className="flex gap-2">
          {step > 0 && (
            <button onClick={()=>setStep(s=>s-1)} className="flex-1 py-4 rounded-2xl bg-gray-100 text-gray-700 font-medium active:scale-95 transition">上一步</button>
          )}
          <button
            onClick={()=> step < steps.length-1 ? setStep(s=>s+1) : onDone({...data, ...targets})}
            className="flex-1 py-4 rounded-2xl bg-green-500 text-white font-semibold active:scale-95 transition shadow-lg shadow-green-500/30">
            {step < steps.length-1 ? '下一步' : '開始記錄'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
 *  Dashboard (今日)
 * ============================================================ */
function Dashboard({ profile, dataVersion, onChanged }){
  const today = todayStr();
  const entries = useMemo(()=> loadJSON(LS_KEYS.entries, []), [dataVersion]);
  const waterLog = useMemo(()=> loadJSON(LS_KEYS.water, []), [dataVersion]);
  const weights = useMemo(()=> loadJSON(LS_KEYS.weight, []), [dataVersion]);

  const todayEntries = entries.filter(e => e.date === today);
  const totals = todayEntries.reduce((a,e)=> ({
    kcal: a.kcal + e.kcal * e.amount,
    p: a.p + e.p * e.amount,
    c: a.c + e.c * e.amount,
    f: a.f + e.f * e.amount,
  }), {kcal:0,p:0,c:0,f:0});

  const todayWater = waterLog.filter(w => w.date === today).reduce((a,w)=>a+w.ml, 0);
  const latestWeight = weights.length > 0 ? weights[weights.length-1] : null;
  const firstWeight = weights[0];

  const addWater = (ml) => {
    const next = [...waterLog, {ml, date: today, t: Date.now()}];
    saveJSON(LS_KEYS.water, next);
    onChanged && onChanged();
  };
  const undoWater = () => {
    const todayList = waterLog.filter(x => x.date === today);
    if(todayList.length === 0) return;
    const lastT = Math.max(...todayList.map(x=>x.t));
    saveJSON(LS_KEYS.water, waterLog.filter(x => x.t !== lastT));
    onChanged && onChanged();
  };

  const greeting = (() => {
    const h = new Date().getHours();
    if(h < 11) return '早安';
    if(h < 14) return '中午好';
    if(h < 18) return '下午好';
    return '晚安';
  })();
  const dateStr = new Date().toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'});
  const progressPct = Math.round((totals.kcal / profile.dailyKcal) * 100);

  // 體重 mini 走勢
  const wChart = useMemo(()=>{
    if(weights.length < 2) return null;
    const recent = weights.slice(-7);
    const W = 280, H = 50;
    const min = Math.min(...recent.map(x=>x.kg)) - 0.5;
    const max = Math.max(...recent.map(x=>x.kg)) + 0.5;
    const pts = recent.map((p,i)=>{
      const x = (i/(recent.length-1))*W;
      const y = H - ((p.kg - min)/(max-min))*H;
      return `${x},${y}`;
    }).join(' ');
    const lastPt = recent[recent.length-1];
    const lastX = W, lastY = H - ((lastPt.kg - min)/(max-min))*H;
    return { pts, lastX, lastY, W, H };
  }, [weights]);

  return (
    <div className="min-h-screen bg-gray-50 pb-32">
      <div className="px-5 pt-6 pb-3 flex justify-between items-start">
        <div>
          <div className="text-xs text-gray-400">{dateStr}</div>
          <div className="text-2xl font-bold text-gray-900 mt-0.5">{greeting}{profile.display_name ? '，' + profile.display_name : ''}</div>
        </div>
        <div className="w-10 h-10 rounded-full bg-gray-100 flex items-center justify-center text-gray-500 font-medium">
          {firstChar(profile.display_name)}
        </div>
      </div>

      <div className="px-4 space-y-3">
        {/* Kcal ring card */}
        <div className="bg-white rounded-3xl p-5 pt-6 flex flex-col items-center">
          <KcalRing consumed={totals.kcal} target={profile.dailyKcal} size={200}/>
          <div className="w-full mt-4 pt-4 border-t border-gray-100 grid grid-cols-3 text-center">
            <div>
              <div className="text-[11px] text-gray-400 mb-0.5">目標</div>
              <div className="text-base font-bold text-gray-900">{profile.dailyKcal.toLocaleString()}</div>
            </div>
            <div className="border-l border-r border-gray-100">
              <div className="text-[11px] text-gray-400 mb-0.5">已攝取</div>
              <div className="text-base font-bold text-gray-900">{Math.round(totals.kcal).toLocaleString()}</div>
            </div>
            <div>
              <div className="text-[11px] text-gray-400 mb-0.5">進度</div>
              <div className="text-base font-bold text-green-500">{progressPct}%</div>
            </div>
          </div>
        </div>

        {/* Macros card */}
        <div className="bg-white rounded-3xl p-5 space-y-4">
          <MacroBar label="蛋白質" value={totals.p} target={profile.proteinG} color="#f87171"/>
          <MacroBar label="碳水" value={totals.c} target={profile.carbsG} color="#fbbf24"/>
          <MacroBar label="脂肪" value={totals.f} target={profile.fatG} color="#60a5fa"/>
        </div>

        {/* Water card */}
        <div className="bg-white rounded-3xl p-5">
          <div className="flex justify-between items-baseline mb-3">
            <div className="flex items-center gap-2">
              <span className="text-cyan-500">{Icons.drop}</span>
              <span className="text-sm font-medium text-gray-700">水分</span>
            </div>
            <div className="text-xs text-gray-400">
              <span className="text-cyan-600 font-bold text-base">{todayWater}</span> / {profile.waterMl} ml
            </div>
          </div>
          <div className="h-2 bg-gray-100 rounded-full overflow-hidden mb-3">
            <div className="h-full bg-cyan-400 rounded-full transition-all duration-500" style={{width: Math.min((todayWater/profile.waterMl)*100,100)+'%'}}/>
          </div>
          <div className="grid grid-cols-4 gap-2">
            {[150, 250, 500].map(ml => (
              <button key={ml} onClick={()=>addWater(ml)}
                className="py-2.5 rounded-2xl bg-cyan-50 text-cyan-700 text-sm font-medium active:scale-95 transition">
                +{ml}
              </button>
            ))}
            <button onClick={undoWater}
              className="py-2.5 rounded-2xl bg-gray-100 text-gray-500 text-xs font-medium active:scale-95 transition flex items-center justify-center gap-1">
              {Icons.undo} 收回
            </button>
          </div>
        </div>

        {/* Weight card */}
        <div className="bg-white rounded-3xl p-5">
          <div className="flex justify-between items-center mb-3">
            <div className="text-sm font-medium text-gray-700">體重趨勢</div>
            {weights.length > 0 && <div className="text-xs text-gray-400">近 {Math.min(weights.length,7)} 筆</div>}
          </div>
          {latestWeight ? (
            <>
              <div className="flex items-baseline gap-3 mb-2">
                <div className="text-4xl font-bold text-gray-900">{latestWeight.kg}</div>
                <div className="text-sm text-gray-400">kg</div>
                {firstWeight && firstWeight !== latestWeight && (
                  <div className={'text-sm font-medium ' + (latestWeight.kg < firstWeight.kg ? 'text-green-500' : 'text-rose-500')}>
                    {latestWeight.kg < firstWeight.kg ? '▼' : '▲'} {Math.abs(latestWeight.kg - firstWeight.kg).toFixed(1)} kg
                  </div>
                )}
              </div>
              {wChart && (
                <svg viewBox={`0 0 ${wChart.W+8} ${wChart.H+8}`} className="w-full mt-1" style={{maxHeight:'60px'}}>
                  <polyline points={wChart.pts} fill="none" stroke="#22c55e" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round" transform="translate(0 4)"/>
                  <circle cx={wChart.lastX} cy={wChart.lastY+4} r="4" fill="#22c55e"/>
                </svg>
              )}
              <div className="flex justify-between text-[11px] text-gray-400 mt-1">
                <span>距目標 {(latestWeight.kg - profile.target_weight_kg).toFixed(1)} kg</span>
                <span>目標 {profile.target_weight_kg} kg</span>
              </div>
            </>
          ) : (
            <div className="text-center py-6">
              <div className="text-gray-400 text-sm mb-2">還沒記錄體重</div>
              <div className="text-[11px] text-gray-400">點下方「體重」分頁開始記錄</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
 *  Record (紀錄) — 含週曆條 + 月曆 overlay
 * ============================================================ */
function Record({ profile, dataVersion, onAdd, onChanged }){
  const today = todayStr();
  const [selectedDate, setSelectedDate] = useState(today);
  const [showCalendar, setShowCalendar] = useState(false);

  // 每次 dataVersion 變動都重新讀 localStorage（避免閃退、不需 unmount）
  const allEntries = useMemo(()=> loadJSON(LS_KEYS.entries, []), [dataVersion]);
  const dayEntries = allEntries.filter(e => e.date === selectedDate);
  const totalKcal = dayEntries.reduce((a,e)=> a + e.kcal * e.amount, 0);

  const deleteEntry = (id) => {
    const next = allEntries.filter(e => e.id !== id);
    saveJSON(LS_KEYS.entries, next);
    onChanged && onChanged();
  };

  // 顯示用日期字串
  const dateLabel = (() => {
    if(selectedDate === today) return '今日';
    const d = parseYMD(selectedDate);
    const weekday = ['日','一','二','三','四','五','六'][d.getDay()];
    return `${d.getMonth()+1}/${d.getDate()} 週${weekday}`;
  })();

  const meals = ['早餐','午餐','晚餐','點心'];

  return (
    <div className="min-h-screen bg-gray-50 pb-32">
      <div className="px-5 pt-6 pb-3">
        <div className="text-xs text-gray-400">{dateLabel} · 共 {Math.round(totalKcal).toLocaleString()} kcal</div>
        <div className="text-2xl font-bold text-gray-900 mt-0.5">飲食紀錄</div>
      </div>

      <div className="px-4 mb-3">
        <WeekStrip
          centerDate={selectedDate}
          selectedDate={selectedDate}
          allEntries={allEntries}
          target={profile.dailyKcal}
          onPick={setSelectedDate}
          onOpenCalendar={()=>setShowCalendar(true)}
        />
      </div>

      <div className="px-4 space-y-3">
        {meals.map(meal => {
          const items = dayEntries.filter(e => e.meal === meal);
          const mealKcal = items.reduce((a,i)=>a + i.kcal * i.amount, 0);
          return (
            <div key={meal} className="bg-white rounded-3xl p-5">
              <div className="flex justify-between items-baseline mb-3">
                <div className="font-bold text-gray-900">{meal}</div>
                <div className="text-sm text-gray-400">
                  {items.length > 0 ? <span><span className="text-gray-700 font-medium">{Math.round(mealKcal)}</span> kcal</span> : <span>0 kcal</span>}
                </div>
              </div>
              {items.length === 0 ? (
                <div className="text-sm text-gray-400 py-2">尚未記錄</div>
              ) : (
                <div className="space-y-2.5">
                  {items.map(item => (
                    <div key={item.id} className="flex justify-between items-center py-1">
                      <div className="flex-1 min-w-0">
                        <div className="text-sm text-gray-900 font-medium truncate">{item.name}</div>
                        <div className="text-[11px] text-gray-400 mt-0.5">
                          {item.amount} {item.unit}
                          {' · '}蛋白 {Math.round(item.p * item.amount)} · 碳水 {Math.round(item.c * item.amount)} · 脂肪 {Math.round(item.f * item.amount)} g
                        </div>
                      </div>
                      <div className="flex items-center gap-3 ml-3">
                        <div className="text-base font-bold text-gray-900">{Math.round(item.kcal * item.amount)}</div>
                        <button onClick={()=>deleteEntry(item.id)}
                          className="w-7 h-7 rounded-full bg-gray-100 text-gray-400 flex items-center justify-center active:scale-90 transition">
                          {Icons.minus}
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
              <button onClick={()=>onAdd({meal, date: selectedDate})} className="mt-3 pt-3 border-t border-gray-100 w-full flex items-center gap-2 text-green-500 text-sm font-medium active:opacity-50">
                {Icons.plusSmall} 新增食物{selectedDate !== today ? `（補記到 ${dateLabel}）` : ''}
              </button>
            </div>
          );
        })}
      </div>

      {showCalendar && (
        <MonthCalendar
          selectedDate={selectedDate}
          allEntries={allEntries}
          target={profile.dailyKcal}
          onPick={setSelectedDate}
          onClose={()=>setShowCalendar(false)}
        />
      )}
    </div>
  );
}

/* ============================================================
 *  Weight (體重)
 * ============================================================ */
function Weight({ profile, dataVersion, onChanged }){
  const weights = useMemo(()=> loadJSON(LS_KEYS.weight, []), [dataVersion]);
  const [input, setInput] = useState(()=> weights.length ? weights[weights.length-1].kg : profile.current_weight_kg);
  const [showInput, setShowInput] = useState(false);

  const save = () => {
    const kg = parseFloat(input);
    if(!kg || kg < 30 || kg > 250) return;
    const date = todayStr();
    const next = [...weights.filter(w => w.date !== date), {kg, date, t: Date.now()}]
      .sort((a,b)=> a.date.localeCompare(b.date));
    saveJSON(LS_KEYS.weight, next);
    setShowInput(false);
    onChanged && onChanged();
  };
  const remove = (date) => {
    const next = weights.filter(w => w.date !== date);
    saveJSON(LS_KEYS.weight, next);
    onChanged && onChanged();
  };

  const chartData = useMemo(()=>{
    if(weights.length === 0) return null;
    const W = 320, H = 160, padX = 16, padY = 20;
    const minKg = Math.min(...weights.map(x=>x.kg), profile.target_weight_kg) - 0.5;
    const maxKg = Math.max(...weights.map(x=>x.kg), profile.target_weight_kg) + 0.5;
    const xs = weights.map((p,i)=> padX + (i/(Math.max(weights.length-1,1)))*(W-padX*2));
    const ys = weights.map(p => padY + (1 - (p.kg - minKg)/(maxKg - minKg))*(H-padY*2));
    const points = xs.map((x,i)=> `${x},${ys[i]}`).join(' ');
    const targetY = padY + (1 - (profile.target_weight_kg - minKg)/(maxKg - minKg))*(H-padY*2);
    return { W, H, points, targetY, xs, ys };
  }, [weights, profile.target_weight_kg]);

  const latest = weights[weights.length-1];
  const first = weights[0];

  return (
    <div className="min-h-screen bg-gray-50 pb-32">
      <div className="px-5 pt-6 pb-3">
        <div className="text-xs text-gray-400">目標 {profile.target_weight_kg.toFixed(1)} kg</div>
        <div className="text-2xl font-bold text-gray-900 mt-0.5">體重</div>
      </div>

      <div className="px-4 space-y-3">
        <div className="bg-white rounded-3xl p-5">
          {latest ? (
            <>
              <div className="flex justify-between items-baseline mb-3">
                <div className="flex items-baseline gap-2">
                  <div className="text-5xl font-bold text-gray-900">{latest.kg}</div>
                  <div className="text-gray-400">kg</div>
                </div>
                {first && first.kg !== latest.kg && (
                  <div className={'text-sm font-medium ' + (latest.kg < first.kg ? 'text-green-500' : 'text-rose-500')}>
                    {latest.kg < first.kg ? '▼' : '▲'} {Math.abs(latest.kg - first.kg).toFixed(1)} kg · 距目標 {Math.abs(latest.kg - profile.target_weight_kg).toFixed(1)}
                  </div>
                )}
              </div>
              {chartData && (
                <>
                  <svg viewBox={`0 0 ${chartData.W} ${chartData.H}`} className="w-full">
                    <line x1={16} x2={chartData.W-16} y1={chartData.targetY} y2={chartData.targetY}
                      stroke="#fca5a5" strokeDasharray="4 4" strokeWidth="1.5"/>
                    <polyline points={chartData.points} fill="none" stroke="#22c55e" strokeWidth="2.5" strokeLinejoin="round" strokeLinecap="round"/>
                    {weights.map((p,i)=>(
                      <circle key={i} cx={chartData.xs[i]} cy={chartData.ys[i]} r={i === weights.length-1 ? 5 : 3} fill="#22c55e"/>
                    ))}
                  </svg>
                  <div className="flex justify-between text-[11px] text-gray-400 mt-2 px-2">
                    <span>{weights[0].date.slice(5)}</span>
                    <span className="text-green-500">目標線 {profile.target_weight_kg.toFixed(1)} kg</span>
                    <span>今天</span>
                  </div>
                </>
              )}
            </>
          ) : (
            <div className="text-center py-8">
              <div className="text-gray-400 text-sm">還沒有任何記錄</div>
            </div>
          )}
        </div>

        {showInput ? (
          <div className="bg-white rounded-3xl p-5">
            <div className="text-sm text-gray-500 mb-3">記錄今天的體重</div>
            <div className="flex gap-2">
              <input type="number" step="0.1" value={input} autoFocus
                onChange={e=>setInput(e.target.value)}
                className="flex-1 px-4 py-4 rounded-2xl border-2 border-green-400 text-3xl font-bold text-center outline-none"/>
              <button onClick={save}
                className="px-6 rounded-2xl bg-green-500 text-white font-semibold active:scale-95 transition shadow-lg shadow-green-500/30">
                儲存
              </button>
              <button onClick={()=>setShowInput(false)}
                className="px-4 rounded-2xl bg-gray-100 text-gray-600 active:scale-95 transition">
                取消
              </button>
            </div>
            <div className="text-[11px] text-gray-400 mt-2">同一天會覆蓋舊記錄</div>
          </div>
        ) : (
          <button onClick={()=>setShowInput(true)}
            className="w-full bg-green-500 text-white py-4 rounded-2xl font-semibold flex items-center justify-center gap-2 active:scale-95 transition shadow-lg shadow-green-500/30">
            {Icons.plusSmall} 記錄今日體重
          </button>
        )}

        <div className="bg-white rounded-3xl overflow-hidden">
          {weights.length === 0 ? (
            <div className="p-8 text-center text-gray-400 text-sm">尚無歷史記錄</div>
          ) : (
            [...weights].reverse().map((w,i,arr) => {
              const prev = arr[i+1];
              const delta = prev ? (w.kg - prev.kg).toFixed(1) : null;
              return (
                <div key={w.date} className={'flex justify-between items-center px-5 py-4 ' + (i<arr.length-1?'border-b border-gray-50':'')}>
                  <div className="text-sm text-gray-400">{w.date.slice(5).replace('-','/')}</div>
                  <div className="flex items-center gap-3">
                    <div className="text-lg font-bold text-gray-900">{w.kg} <span className="text-xs text-gray-400 font-normal">kg</span></div>
                    {delta && (
                      <div className={'text-xs font-medium w-12 text-right ' + (parseFloat(delta) < 0 ? 'text-green-500' : 'text-rose-500')}>
                        {parseFloat(delta) > 0 ? '+' : ''}{delta}
                      </div>
                    )}
                    <button onClick={()=>remove(w.date)} className="text-gray-300 active:opacity-50">
                      {Icons.trash}
                    </button>
                  </div>
                </div>
              );
            })
          )}
        </div>
      </div>
    </div>
  );
}

/* ============================================================
 *  AddFood Modal (新增食物 — 底部 sheet)
 * ============================================================ */
function AddFoodModal({ defaultMeal, targetDate, onClose, onAdded }){
  const [search, setSearch] = useState('');
  const [category, setCategory] = useState('全部');
  const [meal, setMeal] = useState(defaultMeal || (() => {
    const h = new Date().getHours();
    if(h < 10) return '早餐';
    if(h < 14) return '午餐';
    if(h < 17) return '點心';
    if(h < 20) return '晚餐';
    return '點心';
  })());
  const [selected, setSelected] = useState(null);
  const [amount, setAmount] = useState(1);
  const [showManual, setShowManual] = useState(false);
  const [manual, setManual] = useState({ name:'', kcal:'', p:'', c:'', f:'', unit:'份' });
  const [toast, setToast] = useState(null);
  const [recentRefresh, setRecentRefresh] = useState(0); // 觸發「最近吃過」重算

  const effectiveDate = targetDate || todayStr();
  const isPastDate = effectiveDate !== todayStr();

  const recent = useMemo(()=>{
    const all = loadJSON(LS_KEYS.entries, []);
    const seen = new Set();
    return all.slice().reverse().filter(e => {
      if(seen.has(e.name)) return false;
      seen.add(e.name);
      return true;
    }).slice(0, 6);
  }, [recentRefresh]);

  const filtered = useMemo(()=> {
    let list = FOOD_DB;
    if(category !== '全部') list = list.filter(f => f.cat === category);
    if(search.trim()){
      const q = search.trim().toLowerCase();
      list = list.filter(f => f.name.toLowerCase().includes(q));
    }
    return list;
  }, [search, category]);

  const quickAdd = (food, amt=1) => {
    const entries = loadJSON(LS_KEYS.entries, []);
    const newEntry = {
      id: 'e_' + Date.now() + '_' + Math.random().toString(36).slice(2,6),
      name: food.name,
      kcal: food.kcal, p: food.p||0, c: food.c||0, f: food.f||0,
      unit: food.unit,
      amount: amt,
      meal,
      date: effectiveDate,
      t: Date.now(),
    };
    saveJSON(LS_KEYS.entries, [...entries, newEntry]);
    onAdded && onAdded();
    // 顯示 toast,不關閉 modal
    setToast(`已新增 ${food.name}${amt !== 1 ? ` ×${amt}` : ''}`);
    setRecentRefresh(r => r + 1);
  };

  const commitWithAmount = () => {
    quickAdd(selected, amount);
    setSelected(null);
    setAmount(1);
  };

  const submitManual = () => {
    if(!manual.name.trim() || !manual.kcal) return;
    quickAdd({
      name: manual.name.trim(),
      unit: manual.unit || '份',
      kcal: +manual.kcal,
      p: +(manual.p||0), c: +(manual.c||0), f: +(manual.f||0),

    setShowManual(false);
    setManual({ name:'', kcal:'', p:'', c:'', f:'', unit:'份' });

  // 詳細頁
  if(selected){
    return (
      <div className="fade-in" style={{position:'fixed',inset:0,zIndex:100}}>
        <div className="absolute inset-0 bg-black/40" onClick={()=>setSelected(null)}/>
        <div className="absolute left-0 right-0 bottom-0 bg-gray-50 rounded-t-3xl max-w-md mx-auto sheet-in" style={{maxHeight:'90vh', overflow:'auto'}}>
          <div className="flex justify-center pt-3 pb-1">
            <div className="w-10 h-1 bg-gray-300 rounded-full"/>
          </div>
          <div className="flex justify-between items-center px-5 pt-2 pb-3">
            <button onClick={()=>setSelected(null)} className="text-gray-500 active:opacity-50">{Icons.back}</button>
            <div className="font-bold text-gray-900">調整份量</div>
            <div className="w-6"/>
          </div>
          <div className="p-4 space-y-3">
            <div className="bg-white rounded-3xl p-5">
              <div className="text-lg font-bold text-gray-900">{selected.name}</div>
              <div className="text-xs text-gray-400 mt-0.5">{selected.cat} · 每 1 {selected.unit}</div>
              <div className="grid grid-cols-4 gap-2 text-center mt-4 pt-4 border-t border-gray-100">
                <div><div className="text-lg font-bold text-green-500">{Math.round(selected.kcal*amount)}</div><div className="text-[10px] text-gray-400">大卡</div></div>
                <div><div className="text-lg font-bold text-red-400">{(selected.p*amount).toFixed(1)}</div><div className="text-[10px] text-gray-400">蛋白 g</div></div>
                <div><div className="text-lg font-bold text-amber-500">{(selected.c*amount).toFixed(1)}</div><div className="text-[10px] text-gray-400">碳水 g</div></div>
                <div><div className="text-lg font-bold text-blue-400">{(selected.f*amount).toFixed(1)}</div><div className="text-[10px] text-gray-400">脂肪 g</div></div>
              </div>
            </div>
            <div className="bg-white rounded-3xl p-5">
              <div className="text-sm text-gray-500 mb-3">份量</div>
              <div className="grid grid-cols-5 gap-2 mb-3">
                {[0.5, 0.75, 1, 1.5, 2].map(a => (
                  <button key={a} onClick={()=>setAmount(a)}
                    className={'py-2.5 rounded-2xl text-sm font-medium transition active:scale-95 ' + (amount===a?'bg-green-500 text-white':'bg-gray-100 text-gray-600')}>
                    {a===0.5?'半份':a===1?'一份':a+'份'}
                  </button>
                ))}
              </div>
              <input type="number" step="0.1" value={amount}
                onChange={e=>setAmount(+e.target.value)}

      <div className="fade-in" style={{position:'fixed',inset:0,zIndex:100}}>
        <div className="absolute inset-0 bg-black/40" onClick={()=>setShowManual(false)}/>
        <div className="absolute left-0 right-0 bottom-0 bg-gray-50 rounded-t-3xl max-w-md mx-auto sheet-in" style={{maxHeight:'90vh', overflow:'auto'}}>
          <div className="flex justify-center pt-3 pb-1"><div className="w-10 h-1 bg-gray-300 rounded-full"/></div>
          <div className="flex justify-between items-center px-5 pt-2 pb-3">
            <button onClick={()=>setShowManual(false)} className="text-gray-500 active:opacity-50">{Icons.back}</button>
            <div className="font-bold text-gray-900">手動輸入</div>
            <button onClick={submitManual} className="text-green-500 font-medium active:opacity-50">完成</button>
          </div>
          <div className="p-4 space-y-3">
            <div className="bg-white rounded-3xl p-5 space-y-3">
              <input className="w-full px-4 py-3 rounded-2xl bg-gray-50 outline-none" placeholder="食物名稱" value={manual.name} onChange={e=>setManual({...manual, name:e.target.value})}/>
              <div className="grid grid-cols-2 gap-2">
                <input type="number" className="px-4 py-3 rounded-2xl bg-gray-50 outline-none" placeholder="熱量 kcal" value={manual.kcal} onChange={e=>setManual({...manual, kcal:e.target.value})}/>
                <input className="px-4 py-3 rounded-2xl bg-gray-50 outline-none" placeholder="單位（份/碗）" value={manual.unit} onChange={e=>setManual({...manual, unit:e.target.value})}/>
              </div>
              <div className="grid grid-cols-3 gap-2">
                <input type="number" className="px-3 py-3 rounded-2xl bg-gray-50 outline-none" placeholder="蛋白 g" value={manual.p} onChange={e=>setManual({...manual, p:e.target.value})}/>
                <input type="number" className="px-3 py-3 rounded-2xl bg-gray-50 outline-none" placeholder="碳水 g" value={manual.c} onChange={e=>setManual({...manual, c:e.target.value})}/>
                <input type="number" className="px-3 py-3 rounded-2xl bg-gray-50 outline-none" placeholder="脂肪 g" value={manual.f} onChange={e=>setManual({...manual, f:e.target.value})}/>
              </div>
              <div>
                <div className="text-sm text-gray-500 mb-2">用餐</div>
                <div className="grid grid-cols-4 gap-2">
                  {['早餐','午餐','晚餐','點心'].map(m => (
                    <button key={m} onClick={()=>setMeal(m)}
                      className={'py-2.5 rounded-2xl text-sm font-medium transition active:scale-95 ' + (meal===m?'bg-green-500 text-white':'bg-gray-100 text-gray-600')}>{m}</button>
                  ))}
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // 主清單
  return (
    <div className="fade-in" style={{position:'fixed',inset:0,zIndex:100}}>
      <div className="absolute inset-0 bg-black/40" onClick={onClose}/>
      <div className="absolute left-0 right-0 bottom-0 bg-gray-50 rounded-t-3xl max-w-md mx-auto sheet-in" style={{height:'90vh', display:'flex', flexDirection:'column', position:'absolute'}}>
        <Toast message={toast} onDone={()=>setToast(null)}/>
        <div className="flex justify-center pt-3 pb-1">
          <div className="w-10 h-1 bg-gray-300 rounded-full"/>
        </div>
        <div className="flex justify-between items-center px-5 pt-2 pb-1">
          <button onClick={()=>setShowManual(true)} className="text-gray-500 text-sm font-medium active:opacity-50">手動</button>
          <div className="font-bold text-gray-900">新增食物</div>
          <button onClick={onClose} className="text-green-500 font-medium active:opacity-50">完成</button>
        </div>
        {isPastDate && (
          <div className="mx-5 my-2 px-3 py-2 rounded-xl bg-amber-50 border border-amber-200 text-xs text-amber-800">
            ℹ️ 補記到 {(()=>{ const d = parseYMD(effectiveDate); return `${d.getMonth()+1}/${d.getDate()}`; })()}（不是今天）
          </div>
        )}

        <div className="px-4 pb-2">
          <div className="bg-gray-200/60 rounded-2xl p-1 grid grid-cols-4 gap-1">
            {['早餐','午餐','晚餐','點心'].map(m => (
              <button key={m} onClick={()=>setMeal(m)}
                className={'py-2 rounded-xl text-sm font-medium transition ' + (meal===m?'bg-white text-gray-900 shadow-sm':'text-gray-500')}>
                {m}
              </button>
            ))}
          </div>
        </div>

        <div className="px-4 pb-2">
          <div className="bg-white rounded-2xl flex items-center gap-2 px-4 py-3 border border-gray-100">
            <span className="text-gray-400">{Icons.search}</span>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="搜尋食物⋯（雞腿、珍奶）"
              className="flex-1 outline-none bg-transparent text-sm"/>
            {search && <button onClick={()=>setSearch('')} className="text-gray-400 text-sm active:opacity-50">清除</button>}
          </div>
        </div>

        <div className="px-4 pb-2 flex gap-2 overflow-x-auto no-scrollbar">
          {['全部', ...FOOD_CATEGORIES].map(c => (
            <button key={c} onClick={()=>setCategory(c)}
              className={'px-3.5 py-1.5 rounded-full text-xs whitespace-nowrap transition active:scale-95 ' + (category===c?'bg-green-500 text-white':'bg-white text-gray-600 border border-gray-100')}>
              {c}
            </button>
          ))}
        </div>

        <div className="flex-1 overflow-auto px-4 pb-4">
          {recent.length > 0 && search === '' && category === '全部' && (
            <div className="mb-3">
              <div className="text-xs text-gray-400 mb-2 px-1">最近吃過</div>
              <div className="space-y-2">
                {recent.map(r => (
                  <div key={r.id} className="bg-white rounded-2xl p-3.5 flex justify-between items-center">
                    <button onClick={()=>setSelected({name:r.name, unit:r.unit, kcal:r.kcal, p:r.p, c:r.c, f:r.f, cat:'最近'})}
                      className="flex-1 text-left active:opacity-50">
                      <div className="text-sm font-medium text-gray-900 truncate">{r.name}</div>
                      <div className="text-[11px] text-gray-400 mt-0.5">{r.unit} · 蛋白 {r.p} · 碳水 {r.c} · 脂肪 {r.f} g</div>
                    </button>
                    <div className="flex items-center gap-3 ml-3">
                      <div className="text-base font-bold text-gray-900">{r.kcal}</div>
                      <button onClick={()=>quickAdd({name:r.name, unit:r.unit, kcal:r.kcal, p:r.p, c:r.c, f:r.f}, r.amount||1)}
                        className="w-7 h-7 rounded-full bg-green-500 text-white flex items-center justify-center active:scale-90 transition shadow-md shadow-green-500/30">
                        {Icons.plusSmall}
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="space-y-2">
            {filtered.map(f => (
              <div key={f.id} className="bg-white rounded-2xl p-3.5 flex justify-between items-center">
                <button onClick={()=>setSelected(f)} className="flex-1 text-left active:opacity-50">
                  <div className="text-sm font-medium text-gray-900 truncate">{f.name}</div>
                  <div className="text-[11px] text-gray-400 mt-0.5">{f.cat} · 每 {f.unit} · 蛋白 {f.p} · 碳水 {f.c} · 脂肪 {f.f} g</div>
                </button>
                <div className="flex items-center gap-3 ml-3">
                  <div className="text-base font-bold text-gray-900">{f.kcal}</div>
                  <button onClick={()=>quickAdd(f, 1)}
                    className="w-7 h-7 rounded-full bg-green-500 text-white flex items-center justify-center active:scale-90 transition shadow-md shadow-green-500/30">
                    {Icons.plusSmall}
                  </button>
                </div>
              </div>
            ))}
            {filtered.length === 0 && (
              <div className="text-center py-12">
                <div className="text-gray-400 text-sm">找不到「{search}」</div>
                <button onClick={()=>{setManual(m=>({...m, name:search})); setShowManual(true);}}
                  className="mt-3 px-5 py-2.5 bg-green-500 text-white rounded-full text-sm font-medium active:scale-95 transition">
                  手動加進去
                </button>
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
 *  Bottom Nav (5 鍵 + 中央懸浮)
 * ============================================================ */
function BottomNav({ tab, onTab, onAdd }){
  const items = [
    {k:'home', label:'今日', icon: Icons.home},
    {k:'record', label:'紀錄', icon: Icons.record},
    {k:'_add'},
    {k:'weight', label:'體重', icon: Icons.weight},
    {k:'me', label:'我的', icon: Icons.me},
  ];
  return (
    <div style={{position:'fixed', bottom:0, left:'50%', transform:'translateX(-50%)', width:'100%', maxWidth:'448px', zIndex:40}}>
      <div style={{background:'#ffffff', borderTop:'1px solid #f3f4f6', display:'grid', gridTemplateColumns:'repeat(5, 1fr)', position:'relative', paddingBottom:'env(safe-area-inset-bottom, 6px)'}}>
        {items.map(it => {
          if(it.k === '_add'){
            return (
              <div key="add" style={{display:'flex', justifyContent:'center', marginTop:'-24px'}}>
                <button onClick={onAdd}
                  style={{width:'56px', height:'56px', borderRadius:'9999px', background:'#22c55e', color:'#fff', display:'flex', alignItems:'center', justifyContent:'center', border:'none', cursor:'pointer', boxShadow:'0 10px 25px -5px rgba(34,197,94,0.4)'}}>
                  {Icons.plus}
                </button>
              </div>
            );
          }
          const active = tab === it.k;
          return (
            <button key={it.k} onClick={()=>onTab(it.k)}
              style={{padding:'12px 0', display:'flex', flexDirection:'column', alignItems:'center', gap:'2px', background:'transparent', border:'none', cursor:'pointer', color: active ? '#22c55e' : '#9ca3af'}}>
              {it.icon}
              <span style={{fontSize:'10px'}}>{it.label}</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

/* ============================================================
 *  Root
 * ============================================================ */
function App(){
  const [profile, setProfile] = useState(()=> loadJSON(LS_KEYS.profile, null));
  const [tab, setTab] = useState('home');
  const [showAdd, setShowAdd] = useState(false);
  const [addDefaultMeal, setAddDefaultMeal] = useState(null);
  const [addTargetDate, setAddTargetDate] = useState(null);
  const [dataVersion, setDataVersion] = useState(0);

  useEffect(()=> { if(profile) saveJSON(LS_KEYS.profile, profile); }, [profile]);

  if(!profile){
    return <Onboarding onDone={p => setProfile(p)}/>;
  }

  const bumpData = () => setDataVersion(v => v + 1);

  // 接受 openAdd() 或 openAdd({meal, date})
  const openAdd = (opts) => {
    if(typeof opts === 'string'){
      setAddDefaultMeal(opts);
      setAddTargetDate(null);
    } else {
      setAddDefaultMeal(opts?.meal || null);
      setAddTargetDate(opts?.date || null);
    }
    setShowAdd(true);
  };

  return (
    <div className="max-w-md mx-auto bg-gray-50 min-h-screen relative"
         style={{maxWidth:'448px', margin:'0 auto', position:'relative', minHeight:'100vh', background:'#f5f5f7'}}>
      {tab === 'home' && <Dashboard profile={profile} dataVersion={dataVersion} onChanged={bumpData}/>}
      {tab === 'record' && <Record profile={profile} dataVersion={dataVersion} onAdd={openAdd} onChanged={bumpData}/>}
      {tab === 'weight' && <Weight profile={profile} dataVersion={dataVersion} onChanged={bumpData}/>}
      {tab === 'me' && (
        <Me
          profile={profile}
          onUpdate={p => { setProfile(p); bumpData(); }}
          onReset={()=>{
            Object.values(LS_KEYS).forEach(k => localStorage.removeItem(k));
            setProfile(null);
            setTab('home');
          }}
        />
      )}
      <BottomNav tab={tab} onTab={setTab} onAdd={()=>openAdd()}/>
      {showAdd && (
        <AddFoodModal
          defaultMeal={addDefaultMeal}
          targetDate={addTargetDate}
          onClose={()=>setShowAdd(false)}
          onAdded={bumpData}
        />
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  if(window.__appReady) setTimeout(window.__appReady, 100);
} catch(err) {
  if(window.showBootError) window.showBootError('React 初始化失敗', err.stack || err.message || err);
  console.error(err);
}
</script>
</body>
</html>
