<style>
  html, body { background:#f3f4f6; -webkit-tap-highlight-color: transparent; margin:0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "PingFang TC", "Noto Sans TC", sans-serif; }
  * { -webkit-touch-callout: none; }
  input, button, select, textarea { font-family: inherit; }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  @keyframes pop { 0%{transform:scale(.9);opacity:0} 100%{transform:scale(1);opacity:1} }
  .pop { animation: pop .2s ease-out; }
  @keyframes slideUp { 0%{transform:translateY(20px);opacity:0} 100%{transform:translateY(0);opacity:1} }
  .slide-up { animation: slideUp .3s ease-out; }
  /* 載入畫面 */
  #boot { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:#f3f4f6; z-index:9999; transition:opacity .3s; }
  #boot.hide { opacity:0; pointer-events:none; }
  #boot .spinner { width:36px; height:36px; border:3px solid #d1d5db; border-top-color:#10b981; border-radius:50%; animation:spin 1s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
  #boot .text { margin-top:16px; color:#6b7280; font-size:14px; }
  #boot .err { max-width:340px; margin-top:16px; padding:16px; background:#fef2f2; border:1px solid #fecaca; border-radius:12px; color:#991b1b; font-size:13px; line-height:1.6; white-space:pre-wrap; word-break:break-all; }
  #boot .recover { margin-top:14px; display:flex; gap:8px; }
  #boot .recover button { padding:8px 14px; border-radius:8px; border:0; background:#10b981; color:#fff; font-size:13px; cursor:pointer; }
  #boot .recover button.ghost { background:#fff; color:#374151; border:1px solid #d1d5db; }
</style>
</head>
<body>
<div id="root"></div>

<!-- 啟動畫面 + 錯誤顯示 -->
<div id="boot">
  <div class="spinner"></div>
  <div class="text">載入中⋯</div>
  <div class="err" id="bootErr" style="display:none;"></div>
  <div class="recover" id="bootRecover" style="display:none;">
    <button onclick="location.reload()">重新整理</button>
    <button class="ghost" onclick="if(confirm('會清空 App 暫存的選單狀態，但你的資料(體重/飲食/設定)會保留。確定？')){sessionStorage.clear(); location.reload();}">清快取重來</button>
  </div>
</div>

<script>
  // 全域錯誤捕捉 — 再爛掉也讓使用者看到原因，不再空白
  function showBootError(msg, details){
    const boot = document.getElementById('boot');
    const err = document.getElementById('bootErr');
    const rec = document.getElementById('bootRecover');
    if(!boot || !err) return;
    boot.querySelector('.spinner').style.display = 'none';
    boot.querySelector('.text').textContent = msg || '載入失敗';
    err.style.display = 'block';
    err.textContent = (details || '').toString().slice(0, 800);
    rec.style.display = 'flex';
    boot.classList.remove('hide');
  }
  window.addEventListener('error', function(e){
    showBootError('發生錯誤，App 無法啟動', (e.message || '') + '\n' + (e.filename || '') + ':' + (e.lineno || ''));
  });
  window.addEventListener('unhandledrejection', function(e){
    showBootError('非同步錯誤', e.reason && (e.reason.stack || e.reason.message || e.reason) || 'unknown');
  });
  // 8 秒後若 root 還是空的,判定 CDN 沒載到
  setTimeout(function(){
    const root = document.getElementById('root');
    if(root && root.children.length === 0){
      const missing = [];
      if(typeof React === 'undefined') missing.push('React');
      if(typeof ReactDOM === 'undefined') missing.push('ReactDOM');
      if(typeof Babel === 'undefined') missing.push('Babel');
      showBootError(
        '載入超時（8 秒）',
        '可能是網路不穩或 CDN 暫時抓不到。\n' +
        (missing.length ? '未載入：' + missing.join(', ') : '所有 CDN 已載入,但 App 沒啟動') +
        '\n\n建議：(1) 確認連網 (2) 重新整理 (3) 試試其他網路'
      );
    } else {
      const boot = document.getElementById('boot');
      if(boot) boot.classList.add('hide');
      setTimeout(()=> boot && boot.remove(), 400);
    }
  }, 8000);
  // 比較快的成功路徑:render 完就把 boot 收起來
  window.__appReady = function(){
    const boot = document.getElementById('boot');
    if(boot){ boot.classList.add('hide'); setTimeout(()=> boot.remove(), 400); }
  };
</script>

/* ============================================================
 *  計算引擎
 * ============================================================ */
function calcAge(birthDate){
  if(!birthDate) return 30;
  const b = new Date(birthDate);
  const t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  const m = t.getMonth() - b.getMonth();
  if(m < 0 || (m === 0 && t.getDate() < b.getDate())) age--;
  return age;
}

function calcDailyTargets(profile){
  const { gender, birthday, height_cm, current_weight_kg, target_weight_kg, activity_level, weight_loss_pace } = profile;
  const age = calcAge(birthday);
  const w = parseFloat(current_weight_kg);
  const h = parseFloat(height_cm);

  // Mifflin-St Jeor
  let bmr = (10 * w) + (6.25 * h) - (5 * age);
  bmr += (gender === 'male' ? 5 : -161);

  const activityFactors = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725 };
  const tdee = bmr * (activityFactors[activity_level] || 1.375);

  const deficits = { mild:250, standard:500, aggressive:750 };
  let dailyKcal = Math.round(tdee - (deficits[weight_loss_pace] || 500));

  // 健康下限
  const floor = gender === 'male' ? 1500 : 1200;
  let floorApplied = false;
  if(dailyKcal < floor){ dailyKcal = floor; floorApplied = true; }

  // 三大營養素 (30% protein / 40% carbs / 30% fat)
  const proteinG = Math.round((dailyKcal * 0.30) / 4);
  const carbsG   = Math.round((dailyKcal * 0.40) / 4);
  const fatG     = Math.round((dailyKcal * 0.30) / 9);

  // 水分: 體重 × 32 ml
  const waterMl = Math.round(w * 32);

  // 預估達標
  const diff = w - parseFloat(target_weight_kg);
  const weeklyLossKg = (deficits[weight_loss_pace] || 500) * 7 / 7700;
  const weeksToGoal = diff > 0 ? Math.ceil(diff / weeklyLossKg) : 0;
  const estimatedDate = new Date();
  estimatedDate.setDate(estimatedDate.getDate() + weeksToGoal * 7);

  return {
    age,
    bmr: Math.round(bmr),
    tdee: Math.round(tdee),
    dailyKcal,
    proteinG, carbsG, fatG,
    waterMl,
    weeksToGoal,
    estimatedDate: estimatedDate.toISOString().slice(0,10),
    floorApplied,
    bmi: +(w / ((h/100)*(h/100))).toFixed(1),
  };
}

const LS_KEYS = {

function loadJSON(key, fallback){
  try{
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  }catch(e){ return fallback; }
}
function saveJSON(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
}

/* ============================================================
 *  UI 元件
 * ============================================================ */
function KcalRing({ consumed, target, size=180 }){
  const pct = Math.min(consumed / target, 1.2); // 可以超過 100%
  const remaining = target - consumed;
  const r = 70;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - Math.min(pct, 1));
  const overBudget = consumed > target;
  return (
    <div className="relative flex items-center justify-center" style={{width:size, height:size}}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} stroke="#e5e7eb" strokeWidth="14" fill="none"/>
        <circle cx={size/2} cy={size/2} r={r}
          stroke={overBudget ? '#ef4444' : '#16a34a'}
          strokeWidth="14" fill="none"
          strokeDasharray={c}
          strokeDashoffset={offset}
          strokeLinecap="round"
          style={{transition:'stroke-dashoffset .5s ease'}}
        />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="text-xs text-gray-500">{overBudget ? '已超出' : '剩餘'}</div>
        <div className={`text-3xl font-bold ${overBudget?'text-red-500':'text-gray-800'}`}>
          {Math.abs(Math.round(remaining))}
        </div>
        <div className="text-xs text-gray-500">大卡</div>
        <div className="text-[10px] text-gray-400 mt-1">{Math.round(consumed)} / {target}</div>
      </div>
    </div>
  );
}

function StatBar({ label, value, target, color='bg-emerald-500', unit='g' }){
  const pct = Math.min((value/target)*100, 100);
  return (
    <div>
      <div className="flex justify-between text-xs mb-1">
        <span className="text-gray-600">{label}</span>
        <span className="text-gray-700 font-medium">{Math.round(value)}/{target}{unit}</span>
      </div>
      <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
        <div className={color + ' h-full rounded-full transition-all'} style={{width: pct+'%'}}/>
      </div>
    </div>
  );
}

function ScreenShell({ children, title, onBack, rightAction }){
  return (

}

function Dashboard({ profile, onNav }){

  const [water, setWater] = useState(()=> loadJSON(LS_KEYS.water, []));
  const [weights, setWeights] = useState(()=> loadJSON(LS_KEYS.weight, []));

  useEffect(()=> saveJSON(LS_KEYS.entries, entries), [entries]);
  useEffect(()=> saveJSON(LS_KEYS.water, water), [water]);

  const todayEntries = entries.filter(e => e.date === today);
  const totals = todayEntries.reduce((a,e)=> ({
    kcal: a.kcal + e.kcal * e.amount,
    p: a.p + e.p * e.amount,
    c: a.c + e.c * e.amount,
    f: a.f + e.f * e.amount,
  }), {kcal:0,p:0,c:0,f:0});

  const todayWater = water.filter(w => w.date === today).reduce((a,w)=>a+w.ml, 0);
  const latestWeight = weights.length > 0 ? weights[weights.length-1] : null;

  const addWater = (ml) => setWater(w => {
    const next = [...w, {ml, date: today, t: Date.now()}];
    saveJSON(LS_KEYS.water, next);
    return next;

    saveJSON(LS_KEYS.water, next);
    return next;

function AddFood({ onBack, onAdded }){
  const [search, setSearch] = useState('');
  const [category, setCategory] = useState('全部');
  const [selected, setSelected] = useState(null);
  const [amount, setAmount] = useState(1);
  const [meal, setMeal] = useState(() => {
    const h = new Date().getHours();
    if(h < 10) return '早餐';
    if(h < 14) return '午餐';
    if(h < 17) return '點心';
    if(h < 20) return '晚餐';
    return '點心';
  });
  const [showManual, setShowManual] = useState(false);
  const [manual, setManual] = useState({ name:'', kcal:'', p:'', c:'', f:'', unit:'份' });

  // 最近吃過
  const recent = useMemo(()=>{
    const all = loadJSON(LS_KEYS.entries, []);
    const seen = new Set();
    return all.slice().reverse().filter(e => {
      if(seen.has(e.name)) return false;
      seen.add(e.name);
      return true;
    }).slice(0, 6);
  }, []);

  const filtered = useMemo(()=> {
    let list = FOOD_DB;
    if(category !== '全部') list = list.filter(f => f.cat === category);
    if(search.trim()){
      const q = search.trim().toLowerCase();
      list = list.filter(f => f.name.toLowerCase().includes(q));
    }
    return list;
  }, [search, category]);

  const commit = (food, amt, customMeal) => {
    const entries = loadJSON(LS_KEYS.entries, []);
    const newEntry = {
      id: 'e_' + Date.now(),
      name: food.name,
      kcal: food.kcal, p: food.p||0, c: food.c||0, f: food.f||0,
      unit: food.unit,
      amount: amt,
      meal: customMeal || meal,
      date: todayStr(),
      t: Date.now(),
    };
    const next = [...entries, newEntry];
    saveJSON(LS_KEYS.entries, next);
    onAdded && onAdded();
  };

  const submitManual = () => {
    if(!manual.name.trim() || !manual.kcal) return;
    commit({
      name: manual.name.trim(),
      unit: manual.unit || '份',
      kcal: +manual.kcal,
      p: +(manual.p||0), c: +(manual.c||0), f: +(manual.f||0),

    return (
      <ScreenShell title="調整份量" onBack={()=>setSelected(null)}>

              <div><div className="text-base font-bold text-amber-500">{(selected.c*amount).toFixed(1)}</div><div className="text-gray-500">碳水</div></div>
              <div><div className="text-base font-bold text-blue-500">{(selected.f*amount).toFixed(1)}</div><div className="text-gray-500">脂肪</div></div>
            </div>
            <div className="text-sm text-gray-600 mb-2">份量</div>
            <div className="grid grid-cols-5 gap-2 mb-3">
              {[0.5, 0.75, 1, 1.5, 2].map(a => (
                <button key={a} onClick={()=>setAmount(a)}
                  className={`py-2 rounded-lg border-2 text-sm font-medium ${amount===a?'border-emerald-500 bg-emerald-50 text-emerald-700':'border-gray-200 text-gray-600'}`}>
                  {a===0.5?'半份':a===1?'一份':a+'份'}

              ))}
            </div>
            <input type="number" step="0.1" value={amount}

          </div>
          <div className="bg-white rounded-xl p-4 border border-gray-200">
            <div className="text-sm text-gray-600 mb-2">用餐</div>
            <div className="grid grid-cols-4 gap-2">

                <button key={m} onClick={()=>setMeal(m)}

            <input type="number" className="px-3 py-3 rounded-lg border border-gray-300" placeholder="蛋白 g" value={manual.p} onChange={e=>setManual({...manual, p:e.target.value})}/>

/* ============================================================
 *  Weight Log
 * ============================================================ */
function WeightLog({ profile, onBack }){
  const [weights, setWeights] = useState(()=> loadJSON(LS_KEYS.weight, []));
  const [input, setInput] = useState(()=> weights.length ? weights[weights.length-1].kg : profile.current_weight_kg);

  const add = () => {
    const kg = parseFloat(input);
    if(!kg || kg < 30 || kg > 250) return;
    const date = todayStr();
    const next = [...weights.filter(w => w.date !== date), {kg, date, t: Date.now()}]
      .sort((a,b)=> a.date.localeCompare(b.date));
    saveJSON(LS_KEYS.weight, next);
    setWeights(next);
  };

  const remove = (date) => {
    const next = weights.filter(w => w.date !== date);
    saveJSON(LS_KEYS.weight, next);
    setWeights(next);
  };

  // 折線圖座標計算
  const chartData = useMemo(()=>{
    if(weights.length === 0) return null;
    const w = 320, h = 180, pad = 20;
    const minKg = Math.min(...weights.map(x=>x.kg), profile.target_weight_kg) - 1;
    const maxKg = Math.max(...weights.map(x=>x.kg), profile.target_weight_kg) + 1;
    const xs = weights.map((p,i)=> pad + (i/(Math.max(weights.length-1,1)))*(w-pad*2));
    const ys = weights.map(p => pad + (1 - (p.kg - minKg)/(maxKg - minKg))*(h-pad*2));
    const points = xs.map((x,i)=> `${x},${ys[i]}`).join(' ');
    const targetY = pad + (1 - (profile.target_weight_kg - minKg)/(maxKg - minKg))*(h-pad*2);

    // 7-day moving average
    const avgs = weights.map((_,i) => {
      const slice = weights.slice(Math.max(0,i-6), i+1);
      const s = slice.reduce((a,x)=>a+x.kg,0)/slice.length;
      return s;
    });
    const avgYs = avgs.map(v => pad + (1 - (v - minKg)/(maxKg - minKg))*(h-pad*2));
    const avgPoints = xs.map((x,i)=> `${x},${avgYs[i]}`).join(' ');

    return { w, h, points, targetY, minKg, maxKg, avgPoints };
  }, [weights, profile.target_weight_kg]);

  const latest = weights[weights.length-1];
  const prev = weights[weights.length-2];

  return (
    <ScreenShell title="體重追蹤" onBack={onBack}>
      <div className="p-5 space-y-4">
        <div className="bg-white rounded-xl p-4 border border-gray-200">
          <div className="text-sm text-gray-500 mb-2">記錄今天的體重</div>
          <div className="flex gap-2">
            <input type="number" step="0.1" value={input}
              onChange={e=>setInput(e.target.value)}
              className="flex-1 px-4 py-3 rounded-lg border border-gray-300 text-2xl font-bold text-center"/>
            <button onClick={add}
              className="px-6 rounded-lg bg-emerald-500 text-white font-semibold active:bg-emerald-600">
              儲存
            </button>
          </div>
          <div className="text-[11px] text-gray-400 mt-2">同一天會覆蓋舊記錄</div>
        </div>

        {latest && (
          <div className="bg-white rounded-xl p-4 border border-gray-200">
            <div className="grid grid-cols-3 gap-3 text-center">
              <div>
                <div className="text-xs text-gray-500">最新</div>
                <div className="text-xl font-bold text-gray-800">{latest.kg}<span className="text-xs text-gray-400 ml-0.5">kg</span></div>
              </div>
              <div>
                <div className="text-xs text-gray-500">距目標</div>
                <div className="text-xl font-bold text-emerald-600">{(latest.kg - profile.target_weight_kg).toFixed(1)}<span className="text-xs text-gray-400 ml-0.5">kg</span></div>
              </div>
              <div>
                <div className="text-xs text-gray-500">變化</div>
                {prev ? (
                  <div className={`text-xl font-bold ${latest.kg < prev.kg ? 'text-emerald-600':'text-rose-500'}`}>
                    {latest.kg < prev.kg ? '↓':'↑'}{Math.abs(latest.kg - prev.kg).toFixed(1)}
                  </div>
                ) : <div className="text-xl text-gray-300">—</div>}
              </div>
            </div>
          </div>
        )}

        {chartData && (
          <div className="bg-white rounded-xl p-4 border border-gray-200">
            <div className="flex justify-between items-center mb-2">
              <div className="font-semibold text-gray-800">趨勢</div>
              <div className="text-[11px] flex gap-3">
                <span className="flex items-center gap-1"><span className="w-3 h-0.5 bg-emerald-500 inline-block"/>記錄</span>
                <span className="flex items-center gap-1"><span className="w-3 h-0.5 bg-gray-400 inline-block"/>7 日均</span>
                <span className="flex items-center gap-1"><span className="w-3 h-0 border-t border-dashed border-amber-400 inline-block"/>目標</span>
              </div>
            </div>
            <svg viewBox={`0 0 ${chartData.w} ${chartData.h}`} className="w-full">
              <line x1={20} x2={chartData.w-20} y1={chartData.targetY} y2={chartData.targetY}
                stroke="#fbbf24" strokeDasharray="4 3" strokeWidth="1.5"/>
              <polyline points={chartData.avgPoints} fill="none" stroke="#9ca3af" strokeWidth="2"/>
              <polyline points={chartData.points} fill="none" stroke="#10b981" strokeWidth="2.5"/>
              {weights.map((p,i)=>{
                const x = 20 + (i/Math.max(weights.length-1,1))*(chartData.w-40);
                const y = 20 + (1 - (p.kg - chartData.minKg)/(chartData.maxKg - chartData.minKg))*(chartData.h-40);
                return <circle key={i} cx={x} cy={y} r="3" fill="#10b981"/>;
              })}
            </svg>
          </div>
        )}

        <div className="bg-white rounded-xl border border-gray-200">
          <div className="px-4 py-3 border-b border-gray-100 font-semibold text-gray-800 text-sm">歷史記錄</div>
          {weights.length === 0 ? (
            <div className="text-center py-8 text-gray-400 text-sm">還沒有任何記錄</div>
          ) : (
            <div>
              {[...weights].reverse().map(w => (
                <div key={w.date} className="flex justify-between items-center px-4 py-3 border-b border-gray-50 last:border-0">
                  <div>
                    <div className="text-sm text-gray-700">{w.date}</div>
                    <div className="text-lg font-bold text-gray-800">{w.kg} <span className="text-xs text-gray-400">kg</span></div>
                  </div>
                  <button onClick={()=>remove(w.date)} className="text-xs text-red-400 active:opacity-50">刪除</button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </ScreenShell>
  );
}

          <div className="space-y-1 text-emerald-700">
            <div>每日熱量：<span className="font-bold">{newTargets.dailyKcal}</span> 大卡</div>
            <div>蛋白 {newTargets.proteinG}g · 碳水 {newTargets.carbsG}g · 脂肪 {newTargets.fatG}g</div>
            <div>每日水分：{newTargets.waterMl} ml</div>
            <div>BMI {newTargets.bmi}</div>
            {newTargets.floorApplied && <div className="text-amber-700 text-xs mt-1">⚠️ 已套用熱量下限保護</div>}
          </div>
        </div>

        {/* 自訂目標 */}
        <div className="bg-white rounded-xl p-4 border border-gray-200 space-y-3">
          <div className="flex justify-between items-center">
            <div>
              <div className="font-semibold text-gray-800 text-sm">使用自訂目標</div>
              <div className="text-[11px] text-gray-500">開啟後優先使用下方數字，忽略自動計算</div>
            </div>
            <button onClick={()=>setEdit({...edit, useCustomTargets: !edit.useCustomTargets})}
              className={`relative w-12 h-7 rounded-full transition ${edit.useCustomTargets?'bg-emerald-500':'bg-gray-300'}`}>
              <div className={`absolute top-0.5 w-6 h-6 rounded-full bg-white shadow transition-all ${edit.useCustomTargets?'left-[22px]':'left-0.5'}`}/>
            </button>
          </div>

          {edit.useCustomTargets && (
            <div className="slide-up space-y-3 pt-2 border-t border-gray-100">
              <div>
                <label className="text-xs text-gray-500">每日熱量 (kcal)</label>
                <input type="number" value={edit.customKcal}
                  onChange={e=>setEdit({...edit, customKcal: e.target.value})}
                  className="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200 text-lg font-semibold"/>
              </div>
              <div className="grid grid-cols-3 gap-2">
                <div>
                  <label className="text-xs text-rose-500">蛋白 g</label>
                  <input type="number" value={edit.customProtein}
                    onChange={e=>setEdit({...edit, customProtein: e.target.value})}
                    className="w-full mt-1 px-2 py-2 rounded-lg border border-gray-200 text-sm"/>
                </div>
                <div>
                  <label className="text-xs text-amber-500">碳水 g</label>
                  <input type="number" value={edit.customCarbs}
                    onChange={e=>setEdit({...edit, customCarbs: e.target.value})}
                    className="w-full mt-1 px-2 py-2 rounded-lg border border-gray-200 text-sm"/>
                </div>
                <div>
                  <label className="text-xs text-blue-500">脂肪 g</label>
                  <input type="number" value={edit.customFat}
                    onChange={e=>setEdit({...edit, customFat: e.target.value})}
                    className="w-full mt-1 px-2 py-2 rounded-lg border border-gray-200 text-sm"/>
                </div>
              </div>
              <div>
                <label className="text-xs text-cyan-600">每日水分 (ml)</label>
                <input type="number" value={edit.customWater}
                  onChange={e=>setEdit({...edit, customWater: e.target.value})}
                  className="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200"/>
              </div>
              <button onClick={resetCustomToCalculated}
                className="w-full py-2 rounded-lg border border-gray-300 text-xs text-gray-600 active:bg-gray-50">
                ↻ 拉回到自動計算的數字
              </button>
              <div className="text-[11px] text-amber-700 bg-amber-50 rounded-lg p-2 border border-amber-100">
                ⚠️ 自訂目標時，健康下限保護不會自動套用。請依專業建議設定。
              </div>
            </div>
          )}
        </div>

        <button onClick={save}
          className="w-full py-3 rounded-xl bg-emerald-500 text-white font-semibold active:bg-emerald-600">
          儲存變更
        </button>

        <div className="bg-white rounded-xl p-4 border border-gray-200 space-y-2">
          <div className="font-semibold text-gray-800 text-sm">資料管理</div>
          <button onClick={exportData}
            className="w-full py-2.5 rounded-lg border border-gray-300 text-gray-700 active:bg-gray-50">
            匯出資料（JSON）
          </button>
          <button onClick={()=>{
            if(confirm('確定要重置所有資料嗎？這不能還原。')) onReset();
          }}
            className="w-full py-2.5 rounded-lg border border-red-200 text-red-600 active:bg-red-50">
            重置所有資料
          </button>
        </div>

        <div className="text-center text-[11px] text-gray-400 py-4">
          輕食日記 MVP v0.3<br/>
          資料儲存在你的瀏覽器
        </div>
      </div>
    </ScreenShell>
  );
}

/* ============================================================
 *  Root
 * ============================================================ */
function App(){
  const [profile, setProfile] = useState(()=> loadJSON(LS_KEYS.profile, null));
  const [screen, setScreen] = useState('home');
  const [tick, setTick] = useState(0);

  useEffect(()=> {
    if(profile) saveJSON(LS_KEYS.profile, profile);
  }, [profile]);

  const refresh = () => setTick(t=>t+1);

  if(!profile){
    return <Onboarding onDone={p => setProfile(p)}/>;
  }

  const nav = (s) => {
    setScreen(s);
    window.scrollTo(0,0);
  };

  return (
    <div key={tick}>
      {screen === 'home' && <Dashboard profile={profile} onNav={nav}/>}
      {screen === 'addfood' && <AddFood onBack={()=>nav('home')} onAdded={()=>{ refresh(); nav('home'); }}/>}
      {screen === 'weight' && <WeightLog profile={profile} onBack={()=>nav('home')}/>}
      {screen === 'settings' && (
        <Settings
          profile={profile}
          onBack={()=>nav('home')}
          onUpdate={(p)=>setProfile(p)}
          onReset={()=>{
            Object.values(LS_KEYS).forEach(k => localStorage.removeItem(k));
            setProfile(null);
            setScreen('home');
          }}
        />
      )}
    </div>
  );
}

try {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  // 啟動成功,收起 loading
  if(window.__appReady) setTimeout(window.__appReady, 100);
} catch(err) {
  if(window.showBootError) window.showBootError('React 初始化失敗', err.stack || err.message || err);
  console.error(err);
}
</script>
</body>
</html>
