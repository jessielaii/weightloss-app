/* ============================================================
 *  計算引擎
 * ============================================================ */
function calcAge(birthDate){
  if(!birthDate) return 30;
  const b = new Date(birthDate);
  const t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  const m = t.getMonth() - b.getMonth();
  if(m < 0 || (m === 0 && t.getDate() < b.getDate())) age--;
  return age;
}

function calcDailyTargets(profile){
  const { gender, birthday, height_cm, current_weight_kg, target_weight_kg, activity_level, weight_loss_pace } = profile;
  const age = calcAge(birthday);
  const w = parseFloat(current_weight_kg);
  const h = parseFloat(height_cm);

  // Mifflin-St Jeor
  let bmr = (10 * w) + (6.25 * h) - (5 * age);
  bmr += (gender === 'male' ? 5 : -161);

  const activityFactors = { sedentary:1.2, light:1.375, moderate:1.55, active:1.725 };
  const tdee = bmr * (activityFactors[activity_level] || 1.375);

  const deficits = { mild:250, standard:500, aggressive:750 };
  let dailyKcal = Math.round(tdee - (deficits[weight_loss_pace] || 500));

  // 健康下限
  const floor = gender === 'male' ? 1500 : 1200;
  let floorApplied = false;
  if(dailyKcal < floor){ dailyKcal = floor; floorApplied = true; }

  // 三大營養素 (30% protein / 40% carbs / 30% fat)
  const proteinG = Math.round((dailyKcal * 0.30) / 4);
  const carbsG   = Math.round((dailyKcal * 0.40) / 4);
  const fatG     = Math.round((dailyKcal * 0.30) / 9);

  // 水分: 體重 × 32 ml
  const waterMl = Math.round(w * 32);

  // 預估達標
  const diff = w - parseFloat(target_weight_kg);
  const weeklyLossKg = (deficits[weight_loss_pace] || 500) * 7 / 7700;
  const weeksToGoal = diff > 0 ? Math.ceil(diff / weeklyLossKg) : 0;
  const estimatedDate = new Date();
  estimatedDate.setDate(estimatedDate.getDate() + weeksToGoal * 7);

  return {
    age,
    bmr: Math.round(bmr),
    tdee: Math.round(tdee),
    dailyKcal,
    proteinG, carbsG, fatG,
    waterMl,
    weeksToGoal,
    estimatedDate: estimatedDate.toISOString().slice(0,10),
    floorApplied,
    bmi: +(w / ((h/100)*(h/100))).toFixed(1),
  };
}

function KcalRing({ consumed, target, size=180 }){
  const pct = Math.min(consumed / target, 1.2); // 可以超過 100%
  const remaining = target - consumed;
  const r = 70;
  const c = 2 * Math.PI * r;
  const offset = c * (1 - Math.min(pct, 1));
  const overBudget = consumed > target;
  return (
    <div className="relative flex items-center justify-center" style={{width:size, height:size}}>
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={r} stroke="#e5e7eb" strokeWidth="14" fill="none"/>
        <circle cx={size/2} cy={size/2} r={r}
          stroke={overBudget ? '#ef4444' : '#16a34a'}
          strokeWidth="14" fill="none"
          strokeDasharray={c}
          strokeDashoffset={offset}
          strokeLinecap="round"
          style={{transition:'stroke-dashoffset .5s ease'}}
        />
      </svg>
      <div className="absolute inset-0 flex flex-col items-center justify-center">
        <div className="text-xs text-gray-500">{overBudget ? '已超出' : '剩餘'}</div>
        <div className={`text-3xl font-bold ${overBudget?'text-red-500':'text-gray-800'}`}>
          {Math.abs(Math.round(remaining))}
        </div>
        <div className="text-xs text-gray-500">大卡</div>
        <div className="text-[10px] text-gray-400 mt-1">{Math.round(consumed)} / {target}</div>
      </div>
    </div>
  );
}

function StatBar({ label, value, target, color='bg-emerald-500', unit='g' }){
  const pct = Math.min((value/target)*100, 100);
  return (
    <div>
      <div className="flex justify-between text-xs mb-1">
        <span className="text-gray-600">{label}</span>
        <span className="text-gray-700 font-medium">{Math.round(value)}/{target}{unit}</span>
      </div>
      <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
        <div className={color + ' h-full rounded-full transition-all'} style={{width: pct+'%'}}/>
      </div>
    </div>
  );
}

function ScreenShell({ children, title, onBack, rightAction }){
  return (
    <div className="min-h-screen bg-gray-100 max-w-md mx-auto relative">
      {title !== undefined && (
        <div className="sticky top-0 bg-white border-b border-gray-200 z-10 flex items-center justify-between px-3 py-3">
          {onBack ? (
            <button onClick={onBack} className="text-gray-700 px-2 py-1 -ml-2 active:opacity-50">‹ 返回</button>
          ) : <div className="w-12"/>}
          <div className="font-semibold text-gray-800">{title}</div>
          <div className="w-12 text-right">{rightAction}</div>
        </div>
      )}
      {children}
    </div>
  );
}

                className={`p-2 rounded-lg border-2 transition ${data.weight_loss_pace===p.v?'border-emerald-500 bg-emerald-50':'border-gray-200 bg-white'}`}>
                <div className="text-sm font-medium">{p.l}</div>
                <div className="text-[10px] text-gray-500">{p.d}</div>
              </button>
            ))}
          </div>
        </div>
      </div>
    )},
    { title:'你的每日目標', body: targets && (
      <div className="space-y-4">
        {targets.floorApplied && (
          <div className="bg-amber-50 border border-amber-200 rounded-lg p-3 text-xs text-amber-800">
            ⚠️ 你選的步調會讓每日熱量低於健康下限，已自動調整到 {data.gender==='male'?1500:1200} 大卡。
          </div>
        )}
        <div className="bg-white rounded-xl p-4 border border-gray-200">
          <div className="text-xs text-gray-500 mb-1">每日熱量目標</div>
          <div className="text-3xl font-bold text-emerald-600">{targets.dailyKcal} <span className="text-base text-gray-500">大卡</span></div>
          <div className="text-xs text-gray-400 mt-1">BMR {targets.bmr} · TDEE {targets.tdee}</div>
        </div>
        <div className="bg-white rounded-xl p-4 border border-gray-200 space-y-2">
          <div className="text-xs text-gray-500 mb-1">三大營養素</div>
          <div className="grid grid-cols-3 gap-2 text-center">
            <div><div className="text-lg font-bold text-rose-500">{targets.proteinG}g</div><div className="text-[10px] text-gray-500">蛋白質</div></div>
            <div><div className="text-lg font-bold text-amber-500">{targets.carbsG}g</div><div className="text-[10px] text-gray-500">碳水</div></div>
            <div><div className="text-lg font-bold text-blue-500">{targets.fatG}g</div><div className="text-[10px] text-gray-500">脂肪</div></div>
          </div>
        </div>
        <div className="bg-white rounded-xl p-4 border border-gray-200 grid grid-cols-2 gap-3">
          <div>
            <div className="text-xs text-gray-500">每日水分</div>
            <div className="text-xl font-bold text-cyan-600">{targets.waterMl} ml</div>
          </div>
          <div>
            <div className="text-xs text-gray-500">預估達標</div>
            <div className="text-xl font-bold text-gray-700">{targets.weeksToGoal} 週</div>
          </div>
        </div>
      </div>
    )},
  ];

  const cur = steps[step];

  return (
    <div className="min-h-screen bg-white max-w-md mx-auto p-5 pb-24 relative">
      <div className="flex gap-1 mb-6">
        {steps.map((_,i) => (
          <div key={i} className={`flex-1 h-1 rounded-full ${i<=step?'bg-emerald-500':'bg-gray-200'}`}/>
        ))}
      </div>
      <h2 className="text-xl font-bold text-gray-800 mb-4">{cur.title}</h2>
      <div className="slide-up">{cur.body}</div>
      <div className="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 p-4 max-w-md mx-auto">
        <div className="flex gap-2">
          {step > 0 && (
            <button onClick={()=>setStep(s=>s-1)} className="flex-1 py-3 rounded-xl border border-gray-300 text-gray-700 font-medium active:opacity-50">上一步</button>
          )}
          <button
            onClick={()=> step < steps.length-1 ? setStep(s=>s+1) : onDone({...data, ...targets})}
            className="flex-1 py-3 rounded-xl bg-emerald-500 text-white font-semibold active:bg-emerald-600">
            {step < steps.length-1 ? '下一步' : '開始記錄 →'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================

function Dashboard({ profile, onNav }){
  const today = todayStr();
  const [entries, setEntries] = useState(()=> loadJSON(LS_KEYS.entries, []));
  const [water, setWater] = useState(()=> loadJSON(LS_KEYS.water, []));
  const [weights, setWeights] = useState(()=> loadJSON(LS_KEYS.weight, []));

  useEffect(()=> saveJSON(LS_KEYS.entries, entries), [entries]);
  useEffect(()=> saveJSON(LS_KEYS.water, water), [water]);

  const todayEntries = entries.filter(e => e.date === today);
  const totals = todayEntries.reduce((a,e)=> ({
    kcal: a.kcal + e.kcal * e.amount,
    p: a.p + e.p * e.amount,
    c: a.c + e.c * e.amount,
    f: a.f + e.f * e.amount,
  }), {kcal:0,p:0,c:0,f:0});

  const todayWater = water.filter(w => w.date === today).reduce((a,w)=>a+w.ml, 0);
  const latestWeight = weights.length > 0 ? weights[weights.length-1] : null;

  const addWater = (ml) => setWater(w => {
    const next = [...w, {ml, date: today, t: Date.now()}];
    saveJSON(LS_KEYS.water, next);
    return next;
  });
  const undoWater = () => setWater(w => {
    const todayList = w.filter(x => x.date === today);
    if(todayList.length === 0) return w;
    const lastT = Math.max(...todayList.map(x=>x.t));
    const next = w.filter(x => x.t !== lastT);
    saveJSON(LS_KEYS.water, next);
    return next;

    const next = es.filter(e => e.id !== id);
    saveJSON(LS_KEYS.entries, next);
    return next;
  });

  const greeting = (() => {
    const h = new Date().getHours();
    if(h < 11) return '早安';
    if(h < 14) return '中午好';

    return '晚安';

      <div className="bg-white px-5 pt-6 pb-4 border-b border-gray-100">

          今天 {new Date().toLocaleDateString('zh-TW',{month:'long',day:'numeric',weekday:'short'})}

      <div className="bg-white py-6 flex flex-col items-center">
        <KcalRing consumed={totals.kcal} target={profile.dailyKcal}/>
        <div className="mt-4 w-full max-w-xs px-4 space-y-3">
          <StatBar label="蛋白質" value={totals.p} target={profile.proteinG} color="bg-rose-400"/>
          <StatBar label="碳水化合物" value={totals.c} target={profile.carbsG} color="bg-amber-400"/>
          <StatBar label="脂肪" value={totals.f} target={profile.fatG} color="bg-blue-400"/>

      </div>

      {/* Water */}
      <div className="bg-white mt-2 p-5">
        <div className="flex justify-between items-end mb-3">

            <div className="text-sm text-gray-500">今日喝水</div>

/* ============================================================

function AddFood({ onBack, onAdded }){
  const [search, setSearch] = useState('');
  const [category, setCategory] = useState('全部');
  const [selected, setSelected] = useState(null);
  const [amount, setAmount] = useState(1);
  const [meal, setMeal] = useState(() => {
    const h = new Date().getHours();
    if(h < 10) return '早餐';
    if(h < 14) return '午餐';
    if(h < 17) return '點心';
    if(h < 20) return '晚餐';
    return '點心';
  });
  const [showManual, setShowManual] = useState(false);
  const [manual, setManual] = useState({ name:'', kcal:'', p:'', c:'', f:'', unit:'份' });

  // 最近吃過
  const recent = useMemo(()=>{
    const all = loadJSON(LS_KEYS.entries, []);
    const seen = new Set();
    return all.slice().reverse().filter(e => {
      if(seen.has(e.name)) return false;
      seen.add(e.name);
      return true;
    }).slice(0, 6);
  }, []);

  const filtered = useMemo(()=> {
    let list = FOOD_DB;
    if(category !== '全部') list = list.filter(f => f.cat === category);
    if(search.trim()){
      const q = search.trim().toLowerCase();
      list = list.filter(f => f.name.toLowerCase().includes(q));
    }
    return list;
  }, [search, category]);

  const commit = (food, amt, customMeal) => {
    const entries = loadJSON(LS_KEYS.entries, []);
    const newEntry = {
      id: 'e_' + Date.now(),
      name: food.name,
      kcal: food.kcal, p: food.p||0, c: food.c||0, f: food.f||0,
      unit: food.unit,
      amount: amt,
      meal: customMeal || meal,
      date: todayStr(),
      t: Date.now(),
    };
    const next = [...entries, newEntry];
    saveJSON(LS_KEYS.entries, next);
    onAdded && onAdded();
  };

  const submitManual = () => {
    if(!manual.name.trim() || !manual.kcal) return;
    commit({
      name: manual.name.trim(),
      unit: manual.unit || '份',
      kcal: +manual.kcal,
      p: +(manual.p||0), c: +(manual.c||0), f: +(manual.f||0),
    }, 1, meal);
  };

  if(selected){
    return (
      <ScreenShell title="調整份量" onBack={()=>setSelected(null)}>
        <div className="p-5 space-y-4">
          <div className="bg-white rounded-xl p-4 border border-gray-200">
            <div className="text-lg font-semibold text-gray-800">{selected.name}</div>
            <div className="text-xs text-gray-500 mb-3">{selected.cat} · 每 1 {selected.unit}</div>
            <div className="grid grid-cols-4 gap-2 text-center text-xs mb-4">
              <div><div className="text-base font-bold text-emerald-600">{Math.round(selected.kcal*amount)}</div><div className="text-gray-500">大卡</div></div>
              <div><div className="text-base font-bold text-rose-500">{(selected.p*amount).toFixed(1)}</div><div className="text-gray-500">蛋白</div></div>
              <div><div className="text-base font-bold text-amber-500">{(selected.c*amount).toFixed(1)}</div><div className="text-gray-500">碳水</div></div>
              <div><div className="text-base font-bold text-blue-500">{(selected.f*amount).toFixed(1)}</div><div className="text-gray-500">脂肪</div></div>
            </div>
            <div className="text-sm text-gray-600 mb-2">份量</div>
            <div className="grid grid-cols-5 gap-2 mb-3">
              {[0.5, 0.75, 1, 1.5, 2].map(a => (
                <button key={a} onClick={()=>setAmount(a)}
                  className={`py-2 rounded-lg border-2 text-sm font-medium ${amount===a?'border-emerald-500 bg-emerald-50 text-emerald-700':'border-gray-200 text-gray-600'}`}>
                  {a===0.5?'半份':a===1?'一份':a+'份'}
                </button>
              ))}
            </div>
            <input type="number" step="0.1" value={amount}
              onChange={e=>setAmount(+e.target.value)}
              className="w-full px-3 py-2 rounded-lg border border-gray-300 text-center text-sm"/>
          </div>
          <div className="bg-white rounded-xl p-4 border border-gray-200">
            <div className="text-sm text-gray-600 mb-2">用餐</div>
            <div className="grid grid-cols-4 gap-2">
              {['早餐','午餐','晚餐','點心'].map(m => (
                <button key={m} onClick={()=>setMeal(m)}
                  className={`py-2 rounded-lg border-2 text-sm ${meal===m?'border-emerald-500 bg-emerald-50 text-emerald-700':'border-gray-200 text-gray-600'}`}>
                  {m}
                </button>
              ))}
            </div>
          </div>
          <button onClick={()=>commit(selected, amount, meal)}
            className="w-full py-4 rounded-xl bg-emerald-500 text-white font-semibold active:bg-emerald-600">
            加到{meal} · {Math.round(selected.kcal*amount)} 大卡
          </button>
        </div>
      </ScreenShell>
    );
  }

  if(showManual){
    return (
      <ScreenShell title="手動輸入" onBack={()=>setShowManual(false)}>
        <div className="p-5 space-y-3">
          <input className="w-full px-4 py-3 rounded-lg border border-gray-300" placeholder="食物名稱" value={manual.name} onChange={e=>setManual({...manual, name:e.target.value})}/>
          <div className="grid grid-cols-2 gap-2">
            <input type="number" className="px-4 py-3 rounded-lg border border-gray-300" placeholder="熱量 kcal" value={manual.kcal} onChange={e=>setManual({...manual, kcal:e.target.value})}/>
            <input className="px-4 py-3 rounded-lg border border-gray-300" placeholder="單位（份/碗/個）" value={manual.unit} onChange={e=>setManual({...manual, unit:e.target.value})}/>
          </div>
          <div className="grid grid-cols-3 gap-2">
            <input type="number" className="px-3 py-3 rounded-lg border border-gray-300" placeholder="蛋白 g" value={manual.p} onChange={e=>setManual({...manual, p:e.target.value})}/>
            <input type="number" className="px-3 py-3 rounded-lg border border-gray-300" placeholder="碳水 g" value={manual.c} onChange={e=>setManual({...manual, c:e.target.value})}/>
            <input type="number" className="px-3 py-3 rounded-lg border border-gray-300" placeholder="脂肪 g" value={manual.f} onChange={e=>setManual({...manual, f:e.target.value})}/>
          </div>
          <div>
            <div className="text-sm text-gray-600 mb-2">用餐</div>
            <div className="grid grid-cols-4 gap-2">
              {['早餐','午餐','晚餐','點心'].map(m => (
                <button key={m} onClick={()=>setMeal(m)}
                  className={`py-2 rounded-lg border-2 text-sm ${meal===m?'border-emerald-500 bg-emerald-50 text-emerald-700':'border-gray-200'}`}>{m}</button>
              ))}
            </div>
          </div>
          <button onClick={submitManual}
            className="w-full py-4 rounded-xl bg-emerald-500 text-white font-semibold active:bg-emerald-600">
            儲存到 {meal}
          </button>
        </div>
      </ScreenShell>
    );
  }

  return (
    <ScreenShell title="記錄飲食" onBack={onBack} rightAction={
      <button onClick={()=>setShowManual(true)} className="text-emerald-600 text-sm font-medium">手動</button>
    }>
      <div className="p-3">
        <input
          autoFocus
          value={search}
          onChange={e=>setSearch(e.target.value)}
          placeholder="搜尋食物⋯（如：雞腿、珍奶）"
          className="w-full px-4 py-3 rounded-xl bg-white border border-gray-200"
        />

        <div className="flex gap-2 overflow-x-auto no-scrollbar py-3">
          {['全部', ...FOOD_CATEGORIES].map(c => (
            <button key={c} onClick={()=>setCategory(c)}
              className={`px-3 py-1.5 rounded-full text-xs whitespace-nowrap ${category===c?'bg-emerald-500 text-white':'bg-white text-gray-600 border border-gray-200'}`}>
              {c}
            </button>
          ))}
        </div>

        {recent.length > 0 && search === '' && category === '全部' && (
          <div className="mb-4">
            <div className="text-xs text-gray-500 mb-2">最近吃過</div>
            <div className="grid grid-cols-2 gap-2">
              {recent.map(r => (
                <button key={r.id} onClick={()=>{
                  setSelected({name:r.name, unit:r.unit, kcal:r.kcal, p:r.p, c:r.c, f:r.f, cat:'最近'});
                  setAmount(r.amount);
                }}
                  className="bg-white p-3 rounded-lg border border-gray-200 text-left active:bg-gray-50">
                  <div className="text-sm font-medium text-gray-800 truncate">{r.name}</div>
                  <div className="text-[11px] text-gray-500">{Math.round(r.kcal)} kcal / {r.unit}</div>
                </button>
              ))}
            </div>
          </div>
        )}

        <div className="space-y-1.5">
          {filtered.map(f => (
            <button key={f.id} onClick={()=>setSelected(f)}
              className="w-full bg-white p-3 rounded-lg border border-gray-200 text-left active:bg-gray-50 flex justify-between items-center">
              <div>
                <div className="text-sm font-medium text-gray-800">{f.name}</div>
                <div className="text-[11px] text-gray-400">{f.cat} · 每 {f.unit}</div>
              </div>
              <div className="text-right">
                <div className="text-base font-bold text-emerald-600">{f.kcal}</div>
                <div className="text-[10px] text-gray-400">kcal</div>
              </div>
            </button>
          ))}
          {filtered.length === 0 && (
            <div className="text-center py-12 text-gray-400 text-sm">
              <div>找不到「{search}」</div>
              <button onClick={()=>{setManual(m=>({...m, name:search})); setShowManual(true);}}
                className="mt-3 px-4 py-2 bg-emerald-500 text-white rounded-full text-sm">手動加進去</button>
            </div>
          )}
        </div>
      </div>
    </ScreenShell>
  );
}

/* ============================================================
 *  Weight Log
 * ============================================================ */
function WeightLog({ profile, onBack }){
  const [weights, setWeights] = useState(()=> loadJSON(LS_KEYS.weight, []));
  const [input, setInput] = useState(()=> weights.length ? weights[weights.length-1].kg : profile.current_weight_kg);

  const add = () => {
    const kg = parseFloat(input);
    if(!kg || kg < 30 || kg > 250) return;
    const date = todayStr();
    const next = [...weights.filter(w => w.date !== date), {kg, date, t: Date.now()}]
      .sort((a,b)=> a.date.localeCompare(b.date));
    saveJSON(LS_KEYS.weight, next);
    setWeights(next);
  };

  const remove = (date) => {
    const next = weights.filter(w => w.date !== date);
    saveJSON(LS_KEYS.weight, next);
    setWeights(next);
  };

  // 折線圖座標計算
  const chartData = useMemo(()=>{
    if(weights.length === 0) return null;
    const w = 320, h = 180, pad = 20;
    const minKg = Math.min(...weights.map(x=>x.kg), profile.target_weight_kg) - 1;
    const maxKg = Math.max(...weights.map(x=>x.kg), profile.target_weight_kg) + 1;
    const xs = weights.map((p,i)=> pad + (i/(Math.max(weights.length-1,1)))*(w-pad*2));
    const ys = weights.map(p => pad + (1 - (p.kg - minKg)/(maxKg - minKg))*(h-pad*2));
    const points = xs.map((x,i)=> `${x},${ys[i]}`).join(' ');
    const targetY = pad + (1 - (profile.target_weight_kg - minKg)/(maxKg - minKg))*(h-pad*2);

    // 7-day moving average
    const avgs = weights.map((_,i) => {
      const slice = weights.slice(Math.max(0,i-6), i+1);
      const s = slice.reduce((a,x)=>a+x.kg,0)/slice.length;
      return s;
    });
    const avgYs = avgs.map(v => pad + (1 - (v - minKg)/(maxKg - minKg))*(h-pad*2));
    const avgPoints = xs.map((x,i)=> `${x},${avgYs[i]}`).join(' ');

    return { w, h, points, targetY, minKg, maxKg, avgPoints };
  }, [weights, profile.target_weight_kg]);

  const latest = weights[weights.length-1];
  const prev = weights[weights.length-2];

  return (
    <ScreenShell title="體重追蹤" onBack={onBack}>
      <div className="p-5 space-y-4">
        <div className="bg-white rounded-xl p-4 border border-gray-200">
          <div className="text-sm text-gray-500 mb-2">記錄今天的體重</div>
          <div className="flex gap-2">
            <input type="number" step="0.1" value={input}
              onChange={e=>setInput(e.target.value)}
              className="flex-1 px-4 py-3 rounded-lg border border-gray-300 text-2xl font-bold text-center"/>
            <button onClick={add}
              className="px-6 rounded-lg bg-emerald-500 text-white font-semibold active:bg-emerald-600">
              儲存
            </button>
          </div>
          <div className="text-[11px] text-gray-400 mt-2">同一天會覆蓋舊記錄</div>
        </div>

        {latest && (
          <div className="bg-white rounded-xl p-4 border border-gray-200">
            <div className="grid grid-cols-3 gap-3 text-center">
              <div>
                <div className="text-xs text-gray-500">最新</div>
                <div className="text-xl font-bold text-gray-800">{latest.kg}<span className="text-xs text-gray-400 ml-0.5">kg</span></div>
              </div>
              <div>
                <div className="text-xs text-gray-500">距目標</div>
                <div className="text-xl font-bold text-emerald-600">{(latest.kg - profile.target_weight_kg).toFixed(1)}<span className="text-xs text-gray-400 ml-0.5">kg</span></div>
              </div>
              <div>
                <div className="text-xs text-gray-500">變化</div>
                {prev ? (
                  <div className={`text-xl font-bold ${latest.kg < prev.kg ? 'text-emerald-600':'text-rose-500'}`}>
                    {latest.kg < prev.kg ? '↓':'↑'}{Math.abs(latest.kg - prev.kg).toFixed(1)}
                  </div>
                ) : <div className="text-xl text-gray-300">—</div>}
              </div>
            </div>
          </div>
        )}

        {chartData && (
          <div className="bg-white rounded-xl p-4 border border-gray-200">
            <div className="flex justify-between items-center mb-2">
              <div className="font-semibold text-gray-800">趨勢</div>
              <div className="text-[11px] flex gap-3">
                <span className="flex items-center gap-1"><span className="w-3 h-0.5 bg-emerald-500 inline-block"/>記錄</span>
                <span className="flex items-center gap-1"><span className="w-3 h-0.5 bg-gray-400 inline-block"/>7 日均</span>
                <span className="flex items-center gap-1"><span className="w-3 h-0 border-t border-dashed border-amber-400 inline-block"/>目標</span>
              </div>
            </div>
            <svg viewBox={`0 0 ${chartData.w} ${chartData.h}`} className="w-full">
              <line x1={20} x2={chartData.w-20} y1={chartData.targetY} y2={chartData.targetY}
                stroke="#fbbf24" strokeDasharray="4 3" strokeWidth="1.5"/>
              <polyline points={chartData.avgPoints} fill="none" stroke="#9ca3af" strokeWidth="2"/>
              <polyline points={chartData.points} fill="none" stroke="#10b981" strokeWidth="2.5"/>
              {weights.map((p,i)=>{
                const x = 20 + (i/Math.max(weights.length-1,1))*(chartData.w-40);
                const y = 20 + (1 - (p.kg - chartData.minKg)/(chartData.maxKg - chartData.minKg))*(chartData.h-40);
                return <circle key={i} cx={x} cy={y} r="3" fill="#10b981"/>;
              })}
            </svg>
          </div>
        )}

        <div className="bg-white rounded-xl border border-gray-200">
          <div className="px-4 py-3 border-b border-gray-100 font-semibold text-gray-800 text-sm">歷史記錄</div>
          {weights.length === 0 ? (
            <div className="text-center py-8 text-gray-400 text-sm">還沒有任何記錄</div>
          ) : (
            <div>
              {[...weights].reverse().map(w => (
                <div key={w.date} className="flex justify-between items-center px-4 py-3 border-b border-gray-50 last:border-0">
                  <div>
                    <div className="text-sm text-gray-700">{w.date}</div>
                    <div className="text-lg font-bold text-gray-800">{w.kg} <span className="text-xs text-gray-400">kg</span></div>
                  </div>
                  <button onClick={()=>remove(w.date)} className="text-xs text-red-400 active:opacity-50">刪除</button>
                </div>
              ))}
            </div>
          )}
        </div>
      </div>
    </ScreenShell>
  );
}

/* ============================================================
 *  Settings
 * ============================================================ */
function Settings({ profile, onBack, onUpdate, onReset }){
  const [edit, setEdit] = useState({...profile});
  const newTargets = useMemo(()=> calcDailyTargets(edit), [edit]);

  const save = () => {
    onUpdate({...edit, ...newTargets});
    onBack();
  };

  const exportData = () => {
    const data = {
      profile: loadJSON(LS_KEYS.profile, {}),
      entries: loadJSON(LS_KEYS.entries, []),
      water: loadJSON(LS_KEYS.water, []),
      weights: loadJSON(LS_KEYS.weight, []),
      exported_at: new Date().toISOString(),
    };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `輕食日記-${todayStr()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  return (
    <ScreenShell title="設定" onBack={onBack}>
      <div className="p-4 space-y-3">
        <div className="bg-white rounded-xl p-4 border border-gray-200 space-y-3">
          <div className="font-semibold text-gray-800 text-sm">個人資料</div>
          <div>
            <label className="text-xs text-gray-500">暱稱</label>
            <input value={edit.display_name||''} onChange={e=>setEdit({...edit, display_name:e.target.value})}
              className="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200"/>
          </div>
          <div className="grid grid-cols-2 gap-2">
            <div>
              <label className="text-xs text-gray-500">身高 cm</label>
              <input type="number" value={edit.height_cm} onChange={e=>setEdit({...edit, height_cm:+e.target.value})}
                className="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200"/>
            </div>
            <div>
              <label className="text-xs text-gray-500">目前 kg</label>
              <input type="number" step="0.1" value={edit.current_weight_kg} onChange={e=>setEdit({...edit, current_weight_kg:+e.target.value})}
                className="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200"/>
            </div>
            <div>
              <label className="text-xs text-gray-500">目標 kg</label>
              <input type="number" step="0.1" value={edit.target_weight_kg} onChange={e=>setEdit({...edit, target_weight_kg:+e.target.value})}
                className="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200"/>
            </div>
            <div>
              <label className="text-xs text-gray-500">生日</label>
              <input type="date" value={edit.birthday} onChange={e=>setEdit({...edit, birthday:e.target.value})}
                className="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200"/>
            </div>
          </div>
          <div>
            <label className="text-xs text-gray-500">活動量</label>
            <select value={edit.activity_level} onChange={e=>setEdit({...edit, activity_level:e.target.value})}
              className="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200">
              <option value="sedentary">久坐</option>
              <option value="light">輕度</option>
              <option value="moderate">中度</option>
              <option value="active">高度</option>
            </select>
          </div>
          <div>
            <label className="text-xs text-gray-500">減重步調</label>
            <select value={edit.weight_loss_pace} onChange={e=>setEdit({...edit, weight_loss_pace:e.target.value})}
              className="w-full mt-1 px-3 py-2 rounded-lg border border-gray-200">
              <option value="mild">溫和 -0.25kg/週</option>
              <option value="standard">標準 -0.5kg/週</option>
              <option value="aggressive">積極 -0.75kg/週</option>
            </select>
          </div>
        </div>

        <div className="bg-emerald-50 rounded-xl p-4 border border-emerald-200 text-sm">
          <div className="text-emerald-800 font-medium mb-2">預覽新目標</div>
          <div className="space-y-1 text-emerald-700">
            <div>每日熱量：<span className="font-bold">{newTargets.dailyKcal}</span> 大卡</div>
            <div>蛋白 {newTargets.proteinG}g · 碳水 {newTargets.carbsG}g · 脂肪 {newTargets.fatG}g</div>
            <div>每日水分：{newTargets.waterMl} ml</div>
            <div>BMI {newTargets.bmi}</div>
            {newTargets.floorApplied && <div className="text-amber-700 text-xs mt-1">⚠️ 已套用熱量下限保護</div>}
          </div>
        </div>

        <button onClick={save}
          className="w-full py-3 rounded-xl bg-emerald-500 text-white font-semibold active:bg-emerald-600">
          儲存變更
        </button>

        <div className="bg-white rounded-xl p-4 border border-gray-200 space-y-2">
          <div className="font-semibold text-gray-800 text-sm">資料管理</div>
          <button onClick={exportData}
            className="w-full py-2.5 rounded-lg border border-gray-300 text-gray-700 active:bg-gray-50">
            匯出資料（JSON）
          </button>
          <button onClick={()=>{
            if(confirm('確定要重置所有資料嗎？這不能還原。')) onReset();
          }}
            className="w-full py-2.5 rounded-lg border border-red-200 text-red-600 active:bg-red-50">
            重置所有資料
          </button>
        </div>

        <div className="text-center text-[11px] text-gray-400 py-4">
          輕食日記 MVP v0.1<br/>
          資料儲存在你的瀏覽器
        </div>
      </div>
    </ScreenShell>
  );
}

/* ============================================================
 *  Root
 * ============================================================ */
function App(){
  const [profile, setProfile] = useState(()=> loadJSON(LS_KEYS.profile, null));
  const [screen, setScreen] = useState('home');
  const [tick, setTick] = useState(0);

  useEffect(()=> {
    if(profile) saveJSON(LS_KEYS.profile, profile);
  }, [profile]);

  const refresh = () => setTick(t=>t+1);

  if(!profile){
    return <Onboarding onDone={p => setProfile(p)}/>;
  }

  const nav = (s) => {
    setScreen(s);
    window.scrollTo(0,0);
  };

  return (
    <div key={tick}>
      {screen === 'home' && <Dashboard profile={profile} onNav={nav}/>}
      {screen === 'addfood' && <AddFood onBack={()=>nav('home')} onAdded={()=>{ refresh(); nav('home'); }}/>}
      {screen === 'weight' && <WeightLog profile={profile} onBack={()=>nav('home')}/>}
      {screen === 'settings' && (
        <Settings
          profile={profile}
          onBack={()=>nav('home')}
          onUpdate={(p)=>setProfile(p)}
          onReset={()=>{
            Object.values(LS_KEYS).forEach(k => localStorage.removeItem(k));
            setProfile(null);
            setScreen('home');
          }}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
